<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEVE_ULTRA_STABLE_V11_EVOLVED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        body { 
            margin: 0; 
            background: #000; 
            color: #0ff; 
            font-family: 'Fira Code', monospace; 
            overflow: hidden; 
            user-select: none;
        }

        #hud { 
            position: absolute; 
            inset: 0; 
            pointer-events: none; 
            z-index: 10; 
            display: none; 
        }

        .crosshair { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            width: 12px; 
            height: 12px; 
            border: 2px solid rgba(0,255,255,0.8); 
            transform: translate(-50%, -50%); 
            border-radius: 50%; 
        }

        .ui-bottom { 
            position: absolute; 
            bottom: 40px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 50px; 
            box-sizing: border-box; 
        }

        .stat-card { 
            background: rgba(0,10,20,0.85); 
            border-left: 4px solid #0ff; 
            padding: 15px 25px; 
            min-width: 220px; 
            backdrop-filter: blur(5px);
        }

        #hp-bar { width: 100%; height: 6px; background: rgba(255,0,255,0.2); margin-top: 10px; }
        #hp-fill { width: 100%; height: 100%; background: #f0f; transition: 0.2s; box-shadow: 0 0 10px #f0f; }
        
        #reload-bar { height: 3px; background: #0ff; width: 0%; margin-top: 10px; box-shadow: 0 0 8px #0ff; }

        #boot-screen { 
            position: absolute; 
            inset: 0; 
            background: radial-gradient(circle, #001 0%, #000 100%); 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        .btn { 
            padding: 15px 50px; 
            background: none; 
            border: 1px solid #0ff; 
            color: #0ff; 
            cursor: pointer; 
            font-size: 18px; 
            font-family: inherit; 
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .btn:hover { background: rgba(0,255,255,0.1); box-shadow: 0 0 20px rgba(0,255,255,0.4); }

        .glitch { animation: glitch 2s infinite; }
        @keyframes glitch {
            0% { text-shadow: 2px 0 #f0f; }
            50% { text-shadow: -2px 0 #0ff; }
            100% { text-shadow: 2px 0 #f0f; }
        }
    </style>
</head>
<body>

<div id="boot-screen">
    <h1 class="glitch" style="font-size: 48px; margin-bottom: 10px;">NEON_STRIKE.EXE</h1>
    <p style="opacity: 0.6; margin-bottom: 30px;">SYSTEM_STATUS: STABLE | NEURAL_LINK: READY</p>
    <button class="btn" onclick="Core.start()">INITIATE_SESSION</button>
</div>

<div id="hud">
    <div class="crosshair"></div>
    <div id="wave-info" style="position:absolute; top:40px; left:50%; transform:translateX(-50%); text-align:center;">
        <div style="font-size: 28px; font-weight: bold;">WAVE: <span id="wave-num">1</span></div>
        <div id="threat" style="font-size: 12px; color: #f0f; letter-spacing: 3px;">THREAT_LEVEL: MINIMAL</div>
    </div>
    
    <div class="ui-bottom">
        <div class="stat-card">
            <div style="font-size: 12px; opacity: 0.7;">INTEGRITY</div>
            <div style="font-size: 24px;">100%</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
        </div>
        <div class="stat-card" style="text-align: right; border-left: none; border-right: 4px solid #0ff;">
            <div style="font-size: 12px; opacity: 0.7;">PLASMA_RIFLE_V2</div>
            <div style="font-size: 32px;"><span id="ammo-cur">30</span><span style="font-size: 16px; opacity: 0.4;"> / 30</span></div>
            <div id="reload-bar"></div>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

const Core = {
    settings: {
        moveSpeed: 0.16,
        gravity: 0.01,
        lookSense: 0.002
    },

    state: {
        hp: 100,
        ammo: 30,
        isReloading: false,
        wave: 1,
        spawnRate: 3000
    },

    init() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000205);
        this.scene.fog = new THREE.FogExp2(0x000205, 0.015);

        this.camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(this.renderer.domElement);

        this.controls = new PointerLockControls(this.camera, document.body);
        this.clock = new THREE.Clock();
        this.keys = {};

        this.setupLights();
        this.setupPlayer();
        this.setupEnvironment();
        this.bindEvents();
        
        this.enemies = [];
    },

    setupLights() {
        const ambient = new THREE.AmbientLight(0x404040, 0.5);
        this.scene.add(ambient);
        
        this.muzzleFlash = new THREE.PointLight(0x00ffff, 0, 15);
        this.camera.add(this.muzzleFlash);
        this.scene.add(this.camera);
    },

    setupPlayer() {
        this.weaponRoot = new THREE.Group();
        this.weaponSway = new THREE.Group();
        
        // --- УЛУЧШЕННАЯ МОДЕЛЬ ОРУЖИЯ ---
        const g = new THREE.Group();
        
        // Основной корпус (матовый металл)
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(0.14, 0.2, 0.6),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 })
        );
        
        // Энергетический ствол (свечение)
        const barrel = new THREE.Mesh(
            new THREE.CylinderGeometry(0.03, 0.03, 0.7),
            new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 })
        );
        barrel.rotation.x = Math.PI / 2;
        barrel.position.z = -0.2;

        // Детали (рельсы)
        const detail = new THREE.Mesh(
            new THREE.BoxGeometry(0.02, 0.06, 0.5),
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        detail.position.set(0, 0.1, -0.1);
        
        g.add(body, barrel, detail);
        this.weaponModel = g;
        this.weaponModel.position.set(0.35, -0.4, -0.5);
        
        this.weaponSway.add(this.weaponModel);
        this.weaponRoot.add(this.weaponSway);
        this.camera.add(this.weaponRoot);

        this.playerPhys = { vel: new THREE.Vector3(), onGround: true };
    },

    setupEnvironment() {
        // Сетка
        const grid = new THREE.GridHelper(2000, 100, 0x00ffff, 0x001111);
        this.scene.add(grid);

        // Городские блоки
        const box = new THREE.BoxGeometry(1, 1, 1);
        for(let i=0; i<70; i++) {
            const h = 20 + Math.random() * 100;
            const mat = new THREE.MeshStandardMaterial({
                color: 0x000000,
                emissive: 0x00ffff,
                emissiveIntensity: 0.1
            });
            const b = new THREE.Mesh(box, mat);
            b.scale.set(10, h, 10);
            b.position.set((Math.random()-0.5)*800, h/2, (Math.random()-0.5)*800);
            this.scene.add(b);
        }
    },

    bindEvents() {
        window.onkeydown = (e) => this.keys[e.code] = true;
        window.onkeyup = (e) => this.keys[e.code] = false;
        window.onmousedown = () => this.shoot();
        
        // Волна
        setInterval(() => {
            this.state.wave++;
            this.state.spawnRate = Math.max(700, this.state.spawnRate - 300);
            document.getElementById('wave-num').innerText = this.state.wave;
            if(this.state.wave > 3) document.getElementById('threat').innerText = "THREAT_LEVEL: MODERATE";
            if(this.state.wave > 6) document.getElementById('threat').innerText = "THREAT_LEVEL: CRITICAL";
        }, 30000);

        const spawnLoop = () => {
            if(this.controls.isLocked) this.spawnNPC();
            setTimeout(spawnLoop, this.state.spawnRate);
        };
        spawnLoop();
    },

    spawnNPC() {
        // --- МОДЕЛЬ ДРОНА ---
        const drone = new THREE.Group();
        const core = new THREE.Mesh(
            new THREE.OctahedronGeometry(0.6),
            new THREE.MeshStandardMaterial({ color: 0xff00ff, wireframe: true })
        );
        const eye = new THREE.Mesh(
            new THREE.SphereGeometry(0.2),
            new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 })
        );
        eye.position.z = -0.4;
        drone.add(core, eye);

        const angle = Math.random() * Math.PI * 2;
        const dist = 60;
        drone.position.set(Math.cos(angle)*dist, 1.5, Math.sin(angle)*dist);
        
        this.scene.add(drone);
        this.enemies.push({ mesh: drone, hp: 100, phase: Math.random() * Math.PI });
    },

    shoot() {
        if(!this.controls.isLocked || this.state.ammo <= 0 || this.state.isReloading) return;

        this.state.ammo--;
        document.getElementById('ammo-cur').innerText = this.state.ammo;
        
        // Recoil Anim
        this.weaponModel.position.z += 0.15;
        this.weaponModel.rotation.x -= 0.1;
        this.muzzleFlash.intensity = 15;
        setTimeout(() => this.muzzleFlash.intensity = 0, 50);

        const ray = new THREE.Raycaster();
        ray.setFromCamera({x:0, y:0}, this.camera);
        
        const targets = this.enemies.map(e => e.mesh);
        const hits = ray.intersectObjects(targets, true);

        if(hits.length > 0) {
            let hitObj = hits[0].object;
            while(hitObj.parent && !targets.includes(hitObj)) hitObj = hitObj.parent;
            
            const enemy = this.enemies.find(e => e.mesh === hitObj);
            if(enemy) {
                enemy.hp -= 40;
                if(enemy.hp <= 0) {
                    this.scene.remove(enemy.mesh);
                    this.enemies = this.enemies.filter(e => e !== enemy);
                }
            }
        }

        if(this.state.ammo <= 0) this.reload();
    },

    reload() {
        if(this.state.isReloading) return;
        this.state.isReloading = true;
        const bar = document.getElementById('reload-bar');
        
        let start = Date.now();
        const dur = 1200;

        const anim = () => {
            let p = (Date.now() - start) / dur;
            if(p < 1) {
                this.weaponModel.rotation.z = p * Math.PI * 2;
                this.weaponModel.position.y = -0.4 - Math.sin(p * Math.PI) * 0.2;
                bar.style.width = (100 - p * 100) + '%';
                requestAnimationFrame(anim);
            } else {
                this.state.ammo = 30;
                this.state.isReloading = false;
                document.getElementById('ammo-cur').innerText = '30';
                this.weaponModel.rotation.z = 0;
                this.weaponModel.position.y = -0.4;
                bar.style.width = '0%';
            }
        };
        anim();
    },

    update() {
        if(!this.controls.isLocked) return;
        const time = performance.now() * 0.001;

        // Movement
        const speed = this.keys['ShiftLeft'] ? 0.25 : 0.16;
        const moveX = (this.keys['KeyD'] ? 1 : 0) - (this.keys['KeyA'] ? 1 : 0);
        const moveZ = (this.keys['KeyW'] ? 1 : 0) - (this.keys['KeyS'] ? 1 : 0);
        
        if(moveZ !== 0) this.controls.moveForward(moveZ * speed);
        if(moveX !== 0) this.controls.moveRight(moveX * speed);

        // Weapon Procedural
        this.weaponModel.position.z = THREE.MathUtils.lerp(this.weaponModel.position.z, -0.5, 0.1);
        this.weaponModel.rotation.x = THREE.MathUtils.lerp(this.weaponModel.rotation.x, 0, 0.1);

        if(moveX !== 0 || moveZ !== 0) {
            const bS = this.keys['ShiftLeft'] ? 12 : 8;
            this.weaponRoot.position.y = Math.sin(time * bS) * 0.015;
            this.weaponRoot.position.x = Math.cos(time * bS / 2) * 0.01;
            this.weaponRoot.rotation.z = THREE.MathUtils.lerp(this.weaponRoot.rotation.z, -moveX * 0.06, 0.1);
        } else {
            this.weaponRoot.position.y = THREE.MathUtils.lerp(this.weaponRoot.position.y, Math.sin(time * 2) * 0.005, 0.05);
            this.weaponRoot.rotation.z = THREE.MathUtils.lerp(this.weaponRoot.rotation.z, 0, 0.1);
        }

        // Enemies
        this.enemies.forEach(e => {
            e.mesh.position.y = 1.5 + Math.sin(time * 2 + e.phase) * 0.2;
            const dir = new THREE.Vector3().subVectors(this.camera.position, e.mesh.position).normalize();
            e.mesh.position.add(dir.multiplyScalar(0.06 + (this.state.wave * 0.01)));
            e.mesh.lookAt(this.camera.position);

            if(e.mesh.position.distanceTo(this.camera.position) < 2.2) {
                this.state.hp -= 0.4;
                document.getElementById('hp-fill').style.width = this.state.hp + '%';
            }
        });

        if(this.state.hp <= 0) location.reload();
    },

    start() {
        document.getElementById('boot-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        this.init();
        this.controls.lock();
        this.animate();
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        this.update();
        this.renderer.render(this.scene, this.camera);
    }
};

window.Core = Core;
</script>
</body>
</html>

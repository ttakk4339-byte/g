<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STEVE_PROTOCOL_STABLE_v6</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body { margin: 0; background: #000; color: #0ff; font-family: 'Fira Code', monospace; overflow: hidden; }
        
        /* ЗАГРУЗОЧНЫЙ ЭКРАН */
        #terminal {
            position: absolute; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; padding: 20px; overflow: hidden;
        }
        .log { margin: 2px 0; font-size: 12px; }
        #start-prompt {
            margin-top: auto; padding: 40px; text-align: center;
            border: 1px solid #0ff; cursor: pointer; transition: 0.3s;
        }
        #start-prompt:hover { background: rgba(0,255,255,0.1); box-shadow: 0 0 20px #0ff; }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        #hud { display: none; position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; border: 1px solid rgba(0,255,255,0.3); border-radius: 50%;
        }
        #crosshair::after { content: ''; position: absolute; inset: 13px; background: #0ff; border-radius: 50%; }

        .vitals { position: absolute; bottom: 40px; left: 40px; width: 300px; }
        .bar-container { width: 100%; height: 12px; background: #002; border: 1px solid #0ff; margin-top: 5px; }
        #hp-bar { width: 100%; height: 100%; background: #f0f; box-shadow: 0 0 10px #f0f; transition: 0.3s; }
        
        #damage-tint { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle, transparent 50%, rgba(255,0,0,0) 100%); transition: 0.2s; }
        
        .weapon-info { position: absolute; bottom: 40px; right: 40px; text-align: right; }
        .cyber-text { text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 5px #0ff; }
    </style>
</head>
<body>

<div id="damage-tint"></div>

<div id="terminal">
    <div id="logs-container"></div>
    <div id="start-prompt">
        <h1 class="cyber-text">LINK START</h1>
        <p>[ CLICK TO SYNC NEURAL INTERFACE ]</p>
    </div>
</div>

<div id="hud">
    <div id="crosshair"></div>
    <div class="vitals">
        <div class="cyber-text" style="font-size: 14px;">Integrity_Status</div>
        <div class="bar-container"><div id="hp-bar"></div></div>
    </div>
    <div class="weapon-info">
        <div class="cyber-text" style="font-size: 10px;">active_module</div>
        <div id="weapon-name" class="cyber-text" style="font-size: 24px;">CYBER_BLADE</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// --- КОНСТАНТЫ И НАСТРОЙКИ ---
const SETTINGS = {
    ENEMY_COUNT: 25,
    CITY_SIZE: 1000,
    PLAYER_SPEED: 0.15,
    BOB_SPEED: 10,
    SENSE: 0.002
};

class CoreEngine {
    constructor() {
        this.initialized = false;
        this.entities = { enemies: [], particles: [] };
        this.player = { hp: 100, isAttacking: false, lastHit: 0 };
        this.keys = {};
        
        this.initBase();
        this.createWorld();
        this.createPlayer();
        this.setupEventListeners();
    }

    initBase() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000205);
        this.scene.fog = new THREE.FogExp2(0x000205, 0.03);

        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(this.renderer.domElement);

        const amb = new THREE.AmbientLight(0x4040ff, 0.4);
        this.scene.add(amb);

        this.playerLight = new THREE.PointLight(0x00ffff, 2, 25);
        this.scene.add(this.playerLight);
        
        this.clock = new THREE.Clock();
    }

    createWorld() {
        // Пол
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(3000, 3000),
            new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.5 })
        );
        ground.rotation.x = -Math.PI / 2;
        this.scene.add(ground);

        const grid = new THREE.GridHelper(3000, 100, 0x00ffff, 0x002222);
        this.scene.add(grid);

        // Процедурные здания
        const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
        for(let i=0; i<80; i++) {
            const h = 20 + Math.random() * 80;
            const w = 10 + Math.random() * 15;
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x000000, 
                emissive: 0x00ffff, 
                emissiveIntensity: Math.random() * 0.3 
            });
            const b = new THREE.Mesh(buildingGeo, mat);
            b.scale.set(w, h, w);
            b.position.set((Math.random()-0.5)*800, h/2, (Math.random()-0.5)*800);
            this.scene.add(b);
        }

        for(let i=0; i<SETTINGS.ENEMY_COUNT; i++) this.spawnEnemy();
    }

    createPlayer() {
        this.controls = new PointerLockControls(this.camera, document.body);
        this.camera.position.y = 1.8;

        // Рука и оружие
        this.hand = new THREE.Group();
        this.scene.add(this.hand); // Будет обновляться в цикле относительно камеры

        const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshStandardMaterial({color: 0x008888}));
        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.2, 0.2), new THREE.MeshStandardMaterial({color: 0x00ffff, emissive: 0x00ffff}));
        blade.position.set(0, 0.4, -0.6);
        blade.rotation.x = -Math.PI/4;
        
        this.weaponGroup = new THREE.Group();
        this.weaponGroup.add(arm, blade);
        this.weaponGroup.position.set(0.5, -0.4, -0.5);
        this.hand.add(this.weaponGroup);
    }

    spawnEnemy() {
        const g = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 0.2});
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.4), mat);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1;
        g.add(body, head);
        
        g.position.set((Math.random()-0.5)*400, 0.7, (Math.random()-0.5)*400);
        this.scene.add(g);
        this.entities.enemies.push({ mesh: g, hp: 6, lastAttack: 0 });
    }

    setupEventListeners() {
        window.addEventListener('keydown', e => this.keys[e.code] = true);
        window.addEventListener('keyup', e => this.keys[e.code] = false);
        window.addEventListener('mousedown', () => this.attack());
        window.addEventListener('resize', () => {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('start-prompt').onclick = () => {
            this.controls.lock();
            document.getElementById('terminal').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            this.initialized = true;
        };
    }

    attack() {
        if(!this.controls.isLocked || this.player.isAttacking) return;
        this.player.isAttacking = true;

        // Взмах (очень простая анимация через флаг)
        setTimeout(() => this.player.isAttacking = false, 200);

        const ray = new THREE.Raycaster();
        ray.setFromCamera({x:0, y:0}, this.camera);
        const hits = ray.intersectObjects(this.scene.children, true);

        for(let hit of hits) {
            let obj = hit.object;
            while(obj.parent && obj.parent !== this.scene) obj = obj.parent;
            const enemy = this.entities.enemies.find(e => e.mesh === obj);
            if(enemy && hit.distance < 4) {
                enemy.hp -= 2;
                this.createBlood(hit.point);
                if(enemy.hp <= 0) {
                    this.scene.remove(obj);
                    this.entities.enemies = this.entities.enemies.filter(e => e !== enemy);
                    setTimeout(() => this.spawnEnemy(), 3000);
                }
                break;
            }
        }
    }

    createBlood(pos) {
        for(let i=0; i<10; i++) {
            const p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0x00ffff}));
            p.position.copy(pos);
            const v = new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.2, (Math.random()-0.5)*0.2);
            this.entities.particles.push({mesh: p, v, life: 1});
            this.scene.add(p);
        }
    }

    update(delta) {
        if(!this.initialized || !this.controls.isLocked) return;

        const time = this.clock.getElapsedTime();

        // Движение
        const speed = this.keys['ShiftLeft'] ? 0.3 : 0.15;
        if(this.keys['KeyW']) this.controls.moveForward(speed);
        if(this.keys['KeyS']) this.controls.moveForward(-speed);
        if(this.keys['KeyA']) this.controls.moveRight(-speed);
        if(this.keys['KeyD']) this.controls.moveRight(speed);

        // Ground Lock
        this.camera.position.y = 1.8;
        this.playerLight.position.copy(this.camera.position);

        // Анимация оружия
        this.hand.position.copy(this.camera.position);
        this.hand.quaternion.copy(this.camera.quaternion);
        
        const bobY = Math.sin(time * 10) * 0.02;
        const attackOffset = this.player.isAttacking ? -0.5 : 0;
        this.weaponGroup.position.y = -0.4 + bobY;
        this.weaponGroup.position.z = -0.5 + attackOffset;

        // Враги
        this.entities.enemies.forEach(e => {
            const dist = e.mesh.position.distanceTo(this.camera.position);
            if(dist < 30) {
                e.mesh.lookAt(this.camera.position.x, 0.7, this.camera.position.z);
                if(dist > 2) {
                    const dir = this.camera.position.clone().sub(e.mesh.position).normalize();
                    e.mesh.position.add(dir.multiplyScalar(0.06));
                } else if(Date.now() - e.lastAttack > 2000) {
                    this.takeDamage();
                    e.lastAttack = Date.now();
                }
            }
        });

        // Частицы
        for(let i=this.entities.particles.length-1; i>=0; i--) {
            const p = this.entities.particles[i];
            p.mesh.position.add(p.v);
            p.life -= 0.02;
            p.mesh.scale.setScalar(p.life);
            if(p.life <= 0) {
                this.scene.remove(p.mesh);
                this.entities.particles.splice(i,1);
            }
        }
    }

    takeDamage() {
        this.player.hp -= 10;
        document.getElementById('hp-bar').style.width = this.player.hp + "%";
        document.getElementById('damage-tint').style.background = 'radial-gradient(circle, transparent 20%, rgba(255,0,0,0.5) 100%)';
        setTimeout(() => document.getElementById('damage-tint').style.background = 'transparent', 200);
        if(this.player.hp <= 0) location.reload();
    }

    run() {
        const loop = () => {
            requestAnimationFrame(loop);
            const delta = this.clock.getDelta();
            this.update(delta);
            this.renderer.render(this.scene, this.camera);
        };
        loop();
    }
}

// Запуск логов терминала
const container = document.getElementById('logs-container');
const bootLines = [
    "SYST: STEVE_PROTOCOL_INITIALIZING...",
    "MEM: 128GB NEURAL_BUFFER ALLOCATED",
    "GPU: RENDER_THREAD_STABLE",
    "NET: SYNCING VOXEL_STREAM...",
    "INFO: GROUND_LOCK_ENABLED",
    "WARNING: ALEX_ENTITIES_DETECTED_IN_SECTOR_4"
];

bootLines.forEach((text, i) => {
    setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'log';
        div.innerText = `> ${text}`;
        container.appendChild(div);
    }, i * 200);
});

const game = new CoreEngine();
game.run();

</script>
</body>
</html>

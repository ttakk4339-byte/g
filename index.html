<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STEVE_RECKONING: ULTRA_ENGINE_V10</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;700&display=swap');
        body { margin: 0; background: #000; color: #0ff; font-family: 'Fira Code', monospace; overflow: hidden; user-select: none; }
        
        /* ГЛАВНЫЙ ЭКРАН */
        #main-menu { position: absolute; inset: 0; z-index: 1000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 20px solid #001; }
        .cyber-btn { padding: 25px 60px; background: none; border: 3px solid #0ff; color: #0ff; font-family: inherit; font-size: 28px; cursor: pointer; transition: 0.3s; letter-spacing: 5px; }
        .cyber-btn:hover { background: #0ff; color: #000; box-shadow: 0 0 50px #0ff; transform: scale(1.05); }

        /* HUD */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: none; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border: 1px solid rgba(0,255,255,0.3); border-radius: 50%; }
        .crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0ff; transform: translate(-50%, -50%); }

        .ui-panel { position: absolute; padding: 20px; background: rgba(0,10,20,0.8); border: 1px solid #045; backdrop-filter: blur(10px); }
        #vitals { bottom: 40px; left: 40px; width: 300px; border-left: 10px solid #f0f; }
        #weapon-status { bottom: 40px; right: 40px; width: 300px; text-align: right; border-right: 10px solid #0ff; }
        
        .bar { width: 100%; height: 12px; background: #001; margin-top: 10px; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        #hp-fill { background: #f0f; box-shadow: 0 0 15px #f0f; }
        #reload-progress { position: absolute; top: 0; left: 0; width: 0%; height: 100%; background: #0ff; opacity: 0.5; }

        #wave-counter { top: 40px; left: 50%; transform: translateX(-50%); font-size: 20px; text-align: center; border: none; background: none; text-shadow: 0 0 10px #0ff; }
        #event-log { top: 40px; left: 40px; font-size: 10px; color: rgba(0,255,255,0.5); border: none; background: none; }

        #flash { position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: 0.1s; z-index: 100; }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="main-menu">
    <h1 style="font-size: 80px; margin: 0; text-shadow: 0 0 20px #0ff;">V.10_CORE</h1>
    <p style="color: #555; margin-bottom: 50px;">EXPERIMENTAL_WAR_SIMULATION</p>
    <button class="cyber-btn" onclick="Engine.boot()">INITIALIZE</button>
</div>

<div id="hud">
    <div class="crosshair"></div>
    
    <div id="event-log">SYSTEM_READY...<br>AWAITING_SYNC...</div>

    <div id="wave-counter">
        WAVE: <span id="wave-val">1</span><br>
        <small style="font-size: 10px; opacity: 0.7;">NEXT_ESCALATION: <span id="timer-val">60</span>s</small>
    </div>

    <div id="vitals" class="ui-panel">
        <div style="font-size: 14px;">INTEGRITY</div>
        <div class="bar"><div id="hp-fill" class="bar-fill"></div></div>
    </div>

    <div id="weapon-status" class="ui-panel">
        <div id="weapon-name" style="font-size: 18px; font-weight: bold;">R-35 CYBER_RIFLE</div>
        <div style="font-size: 30px;"><span id="mag-cur">30</span> / <span id="mag-max">30</span></div>
        <div class="bar" id="reload-bar"><div id="reload-progress"></div></div>
        <div id="reload-hint" style="font-size: 10px; color: #f0f; display: none;">RELOADING...</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

/** * ============================================================================
 * ENGINE CORE: V10_STABLE
 * ============================================================================
 */

class Weapon {
    constructor() {
        this.magSize = 30;
        this.ammo = 30;
        this.isReloading = false;
        this.reloadTime = 1800; // мс
        this.fireRate = 120; // мс между выстрелами
        this.lastFire = 0;
        this.recoil = 0;
        this.sway = 0;
        
        this.group = new THREE.Group();
        this.initModel();
    }

    initModel() {
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.22, 0.8), new THREE.MeshStandardMaterial({color: 0x111111}));
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.6), new THREE.MeshStandardMaterial({color: 0x00ffff, emissive: 0x00ffff}));
        barrel.rotation.x = Math.PI/2;
        barrel.position.z = -0.4;
        
        const mag = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.3, 0.15), new THREE.MeshStandardMaterial({color: 0x333333}));
        mag.position.y = -0.2;
        
        this.group.add(body, barrel, mag);
        this.group.position.set(0.4, -0.4, -0.6);
    }

    reload() {
        if (this.isReloading || this.ammo === this.magSize) return;
        this.isReloading = true;
        document.getElementById('reload-hint').style.display = 'block';
        
        let start = Date.now();
        const interval = setInterval(() => {
            let elapsed = Date.now() - start;
            let progress = (elapsed / this.reloadTime) * 100;
            document.getElementById('reload-progress').style.width = progress + "%";
            
            // Анимация наклона при перезарядке
            this.group.rotation.x = -Math.sin(elapsed/this.reloadTime * Math.PI) * 0.5;

            if (elapsed >= this.reloadTime) {
                this.ammo = this.magSize;
                this.isReloading = false;
                document.getElementById('mag-cur').innerText = this.ammo;
                document.getElementById('reload-progress').style.width = "0%";
                document.getElementById('reload-hint').style.display = 'none';
                clearInterval(interval);
            }
        }, 16);
    }
}

class Enemy {
    constructor(scene, playerPos) {
        this.scene = scene;
        this.hp = 100;
        this.speed = 0.04 + Math.random() * 0.04;
        this.mesh = this.createMesh();
        
        // Рандомный спавн на расстоянии
        const angle = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 40;
        this.mesh.position.set(Math.cos(angle)*dist, 0.8, Math.sin(angle)*dist);
        
        scene.add(this.mesh);
    }

    createMesh() {
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.6, 0.4), new THREE.MeshStandardMaterial({color: 0xff00ff}));
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.1;
        group.add(body, head);
        return group;
    }

    update(playerPos) {
        const dir = new THREE.Vector3().copy(playerPos).setY(0.8).sub(this.mesh.position).normalize();
        this.mesh.position.add(dir.multiplyScalar(this.speed));
        this.mesh.lookAt(playerPos.x, 0.8, playerPos.z);
    }
}

const Engine = {
    init() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000105);
        this.scene.fog = new THREE.FogExp2(0x000105, 0.02);

        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(this.renderer.domElement);

        this.controls = new PointerLockControls(this.camera, document.body);
        this.clock = new THREE.Clock();
        
        this.weapon = new Weapon();
        this.camera.add(this.weapon.group);
        this.scene.add(this.camera);

        this.player = { hp: 100, vel: new THREE.Vector3(), onGround: true };
        this.enemies = [];
        this.particles = [];
        this.keys = {};
        
        this.wave = 1;
        this.waveTimer = 60;
        this.lastWaveTime = Date.now();

        this.setupLights();
        this.setupWorld();
        this.bindEvents();
    },

    setupLights() {
        const amb = new THREE.AmbientLight(0xffffff, 0.2);
        this.scene.add(amb);
        this.muzzleFlash = new THREE.PointLight(0x00ffff, 0, 15);
        this.camera.add(this.muzzleFlash);
    },

    setupWorld() {
        const grid = new THREE.GridHelper(2000, 100, 0x00ffff, 0x001122);
        this.scene.add(grid);

        // Футуристические колонны
        for(let i=0; i<150; i++) {
            const h = 5 + Math.random() * 50;
            const b = new THREE.Mesh(
                new THREE.BoxGeometry(4, h, 4),
                new THREE.MeshStandardMaterial({color: 0x000000, emissive: 0x00ffff, emissiveIntensity: 0.1})
            );
            b.position.set((Math.random()-0.5)*1000, h/2, (Math.random()-0.5)*1000);
            this.scene.add(b);
        }
    },

    bindEvents() {
        window.onkeydown = (e) => this.keys[e.code] = true;
        window.onkeyup = (e) => this.keys[e.code] = false;
        window.onmousedown = () => this.shoot();
        
        this.controls.addEventListener('lock', () => {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
        });
    },

    boot() {
        this.init();
        this.controls.lock();
        this.animate();
        this.log("KERNEL_LOADED... ALL_SYSTEMS_GO");
    },

    log(msg) {
        const el = document.getElementById('event-log');
        el.innerHTML = `> ${msg}<br>` + el.innerHTML.split('<br>').slice(0, 5).join('<br>');
    },

    shoot() {
        const w = this.weapon;
        if (w.isReloading || w.ammo <= 0 || Date.now() - w.lastFire < w.fireRate) {
            if (w.ammo <= 0) this.log("OUT_OF_AMMO. PRESS 'R'");
            return;
        }

        w.ammo--;
        w.lastFire = Date.now();
        document.getElementById('mag-cur').innerText = w.ammo;

        // Эффекты
        this.muzzleFlash.intensity = 10;
        setTimeout(() => this.muzzleFlash.intensity = 0, 50);
        
        // Отдача (анимация)
        w.group.position.z += 0.15;
        this.camera.rotation.x += 0.02;

        // Проверка попадания
        const ray = new THREE.Raycaster();
        ray.setFromCamera({x:0, y:0}, this.camera);
        const hits = ray.intersectObjects(this.scene.children, true);

        for(let hit of hits) {
            let target = hit.object;
            while(target.parent && target.parent !== this.scene) target = target.parent;
            
            const enemy = this.enemies.find(e => e.mesh === target);
            if(enemy) {
                this.hitEnemy(enemy, hit.point);
                break;
            }
        }
    },

    hitEnemy(enemy, point) {
        enemy.hp -= 35;
        this.spawnBlood(point);
        if(enemy.hp <= 0) {
            this.scene.remove(enemy.mesh);
            this.enemies = this.enemies.filter(e => e !== enemy);
            this.log("TARGET_ELIMINATED");
        }
    },

    spawnBlood(pos) {
        for(let i=0; i<8; i++) {
            const p = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.1), new THREE.MeshBasicMaterial({color: 0x00ffff}));
            p.position.copy(pos);
            const vel = new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.2, (Math.random()-0.5)*0.2);
            this.particles.push({mesh: p, vel, life: 1.0});
            this.scene.add(p);
        }
    },

    updateWaves() {
        const now = Date.now();
        const elapsed = Math.floor((now - this.lastWaveTime) / 1000);
        const remaining = 60 - elapsed;
        document.getElementById('timer-val').innerText = remaining;

        if (remaining <= 0) {
            this.wave++;
            this.lastWaveTime = now;
            this.log(`ESCALATION_LEVEL_${this.wave}_REACHED`);
            document.getElementById('wave-val').innerText = this.wave;
        }

        // Динамический спавн (чем выше волна, тем чаще)
        const spawnChance = 0.01 * this.wave;
        if (Math.random() < spawnChance && this.enemies.length < 100) {
            this.enemies.push(new Enemy(this.scene, this.camera.position));
        }
    },

    update(delta) {
        if (!this.controls.isLocked) return;

        const time = performance.now() * 0.001;

        // 1. ПЕРЕМЕЩЕНИЕ И ФИЗИКА
        const speed = this.keys['ShiftLeft'] ? 0.3 : 0.16;
        const input = new THREE.Vector3();
        if(this.keys['KeyW']) input.z -= 1;
        if(this.keys['KeyS']) input.z += 1;
        if(this.keys['KeyA']) input.x -= 1;
        if(this.keys['KeyD']) input.x += 1;
        
        input.normalize();
        this.controls.moveRight(input.x * speed);
        this.controls.moveForward(-input.z * speed);

        if(this.keys['KeyR']) this.weapon.reload();

        // Гравитация
        this.player.vel.y -= 0.008;
        this.camera.position.y += this.player.vel.y;
        if (this.camera.position.y < 1.8) {
            this.camera.position.y = 1.8;
            this.player.vel.y = 0;
            this.player.onGround = true;
        }

        // 2. АНИМАЦИИ ОРУЖИЯ (SWAY & BOBBING)
        const w = this.weapon;
        w.group.position.z = THREE.MathUtils.lerp(w.group.position.z, -0.6, 0.1); // Возврат после отдачи
        
        // Качание при ходьбе
        if (input.length() > 0) {
            const walkBob = Math.sin(time * 12) * 0.02;
            w.group.position.y = -0.4 + walkBob;
            w.group.position.x = 0.4 + Math.cos(time * 6) * 0.01;
            this.camera.rotation.z = Math.sin(time * 6) * 0.01;
        } else {
            w.group.position.y = THREE.MathUtils.lerp(w.group.position.y, -0.4, 0.05);
            w.group.position.x = THREE.MathUtils.lerp(w.group.position.x, 0.4, 0.05);
            this.camera.rotation.z = THREE.MathUtils.lerp(this.camera.rotation.z, 0, 0.05);
        }

        // 3. ОБНОВЛЕНИЕ ОРДЫ
        this.updateWaves();
        this.enemies.forEach(e => {
            e.update(this.camera.position);
            // Проверка дистанции атаки
            if(e.mesh.position.distanceTo(this.camera.position) < 2.5) {
                this.takeDamage(0.3);
            }
        });

        // 4. ЧАСТИЦЫ
        for(let i=this.particles.length-1; i>=0; i--) {
            const p = this.particles[i];
            p.mesh.position.add(p.vel);
            p.life -= 0.02;
            p.mesh.scale.setScalar(p.life);
            if(p.life <= 0) {
                this.scene.remove(p.mesh);
                this.particles.splice(i, 1);
            }
        }
    },

    takeDamage(amt) {
        this.player.hp -= amt;
        document.getElementById('hp-fill').style.width = this.player.hp + "%";
        document.getElementById('flash').style.opacity = 1;
        document.getElementById('flash').style.background = 'rgba(255,0,255,0.2)';
        setTimeout(() => document.getElementById('flash').style.opacity = 0, 50);
        
        if(this.player.hp <= 0) {
            alert("NEURAL_LINK_SEVERED. FINAL_WAVE: " + this.wave);
            location.reload();
        }
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const delta = this.clock.getDelta();
        this.update(delta);
        this.renderer.render(this.scene, this.camera);
    }
};

window.Engine = Engine;
</script>
</body>
</html>

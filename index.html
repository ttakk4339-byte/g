<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CYBER STEVE: TEXTURE & ANIMATION UPDATE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; }
        #menu { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .btn { width: 350px; padding: 20px; margin: 10px; background: #555; border: 4px solid #000; color: #fff; cursor: pointer; text-align: center; box-shadow: inset -4px -4px 0 #222, inset 4px 4px 0 #888; }
        .btn:hover { background: #777; border-color: #fff; }
        #hud { position: absolute; width: 100%; height: 100%; pointer-events: none; display: none; }
        #hotbar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.7); border: 4px solid #8b8b8b; padding: 4px; }
        .slot { width: 45px; height: 45px; border: 3px solid #444; margin: 2px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .slot.active { border-color: #fff; background: rgba(255,255,255,0.3); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); border: 2px solid #fff; border-radius: 50%; mix-blend-mode: difference; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color: #0ff; font-size: 40px; text-shadow: 4px 4px #f0f;">CYBER STEVE 2.0</h1>
    <div class="btn" onclick="start()">START GAME</div>
</div>

<div id="hud">
    <div id="crosshair"></div>
    <div id="hotbar">
        <div class="slot active" id="s0">⚒</div>
        <div class="slot" id="s1">⚔</div>
        <div class="slot" id="s2">🏹</div>
        <div class="slot" id="s3">🍎</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// --- ГЕНЕРАТОР ПИКСЕЛЬНЫХ ТЕКСТУР ---
function createPixelTexture(color1, color2, size = 16) {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    for(let x=0; x<size; x++) {
        for(let y=0; y<size; y++) {
            ctx.fillStyle = Math.random() > 0.5 ? color1 : color2;
            ctx.fillRect(x, y, 1, 1);
        }
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.magFilter = THREE.NearestFilter;
    return tex;
}

const texSteve = createPixelTexture('#00cccc', '#008888');
const texAlex = createPixelTexture('#ff77ff', '#aa44aa');
const texSkin = createPixelTexture('#ffdbac', '#e0ac69');
const texMetal = createPixelTexture('#aaaaaa', '#777777');
const texWood = createPixelTexture('#8b4513', '#5d2e0d');

// --- СЦЕНА ---
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020208, 0.02);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);
window.start = () => controls.lock();
controls.addEventListener('lock', () => { 
    document.getElementById('menu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
});
controls.addEventListener('unlock', () => {
    document.getElementById('menu').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
});

// --- ПРЕДМЕТЫ В РУКЕ ---
const handContainer = new THREE.Group();
camera.add(handContainer);
scene.add(camera);

let currentItem = null;
const items = {
    pickaxe: createTool('pick'),
    sword: createTool('sword'),
    bow: createTool('bow'),
    apple: createTool('apple')
};

function createTool(type) {
    const group = new THREE.Group();
    if(type === 'pick') {
        const handle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.1), new THREE.MeshStandardMaterial({map: texWood}));
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.15, 0.2), new THREE.MeshStandardMaterial({map: texMetal}));
        head.position.y = 0.4; group.add(handle, head);
    } else if(type === 'sword') {
        const handle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.1), new THREE.MeshStandardMaterial({map: texWood}));
        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.0, 0.05), new THREE.MeshStandardMaterial({map: texMetal}));
        blade.position.y = 0.6; group.add(handle, blade);
    } else if(type === 'apple') {
        const apple = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0xff0000}));
        group.add(apple);
    } else {
        const bow = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.2), new THREE.MeshStandardMaterial({color: 0x5d2e0d}));
        group.add(bow);
    }
    group.visible = false;
    handContainer.add(group);
    return group;
}

function setItem(index) {
    Object.values(items).forEach(i => i.visible = false);
    const keys = Object.keys(items);
    currentItem = items[keys[index]];
    currentItem.visible = true;
    document.querySelectorAll('.slot').forEach((s,i) => s.classList.toggle('active', i === index));
}
setItem(0);

// --- ВРАГИ (АЛЕКС) ---
const enemies = [];
function spawnAlex() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({map: texAlex}));
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({map: texSkin}));
    head.position.y = 0.85;
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), new THREE.MeshStandardMaterial({color: 0x3333ff}));
    legL.position.set(0.2, -1, 0);
    const legR = legL.clone(); legR.position.x = -0.2;
    g.add(body, head, legL, legR);
    g.position.set((Math.random()-0.5)*80, 1.5, (Math.random()-0.5)*80);
    scene.add(g);
    enemies.push({mesh: g, hp: 5, legL, legR, lastHit: 0});
}
for(let i=0; i<12; i++) spawnAlex();

// --- СВЕТ И МИР ---
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const pLight = new THREE.PointLight(0x00ffff, 1.5, 20);
camera.add(pLight);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x111111}));
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// --- ЛОГИКА ---
const keys = {};
window.onkeydown = (e) => {
    keys[e.key.toLowerCase()] = true;
    if(e.key >= '1' && e.key <= '4') setItem(parseInt(e.key)-1);
};
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

let attackAnim = 0;
window.onmousedown = () => { if(controls.isLocked) attackAnim = 1; };

const raycaster = new THREE.Raycaster();
function doAttack() {
    raycaster.setFromCamera({x:0, y:0}, camera);
    const hits = raycaster.intersectObjects(scene.children, true);
    for(let hit of hits) {
        let obj = hit.object;
        while(obj.parent && obj.parent !== scene) obj = obj.parent;
        let e = enemies.find(en => en.mesh === obj);
        if(e && hit.distance < 4) {
            e.hp -= 1;
            e.lastHit = Date.now();
            e.mesh.position.addScaledVector(camera.getWorldDirection(new THREE.Vector3()), -1);
            if(e.hp <= 0) {
                scene.remove(e.mesh);
                enemies.splice(enemies.indexOf(e), 1);
                spawnAlex();
            }
            break;
        }
    }
}

// --- ЦИКЛ ---
const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    const delta = clock.getDelta();

    if(controls.isLocked) {
        // Движение
        const speed = keys['shift'] ? 0.25 : 0.15;
        if(keys['w']) controls.moveForward(speed);
        if(keys['s']) controls.moveForward(-speed);
        if(keys['a']) controls.moveRight(-speed);
        if(keys['d']) controls.moveRight(speed);

        // Анимация руки (Idle + Walking)
        const isMoving = keys['w'] || keys['s'] || keys['a'] || keys['d'];
        handContainer.position.set(
            0.5 + Math.cos(t * 2) * 0.02, 
            -0.4 + Math.sin(t * 4) * 0.02 + (isMoving ? Math.sin(t * 10) * 0.05 : 0),
            -0.5 + (isMoving ? Math.cos(t * 10) * 0.05 : 0)
        );

        // Анимация атаки
        if(attackAnim > 0) {
            attackAnim -= delta * 10;
            handContainer.rotation.x = Math.sin(attackAnim * Math.PI) * 1.2;
            if(attackAnim <= 0.5 && attackAnim + delta * 10 > 0.5) doAttack();
        } else {
            handContainer.rotation.x = 0;
        }

        // Враги
        enemies.forEach(e => {
            const dist = e.mesh.position.distanceTo(camera.position);
            const isHit = Date.now() - e.lastHit < 200;
            e.mesh.traverse(m => { if(m.isMesh) m.material.emissive?.setHex(isHit ? 0xff0000 : 0x000000); });

            if(dist < 25) {
                const dir = camera.position.clone().sub(e.mesh.position).setY(0).normalize();
                e.mesh.position.add(dir.multiplyScalar(0.04));
                e.mesh.lookAt(camera.position.x, 1.5, camera.position.z);
                e.legL.rotation.x = Math.sin(t * 10) * 0.5;
                e.legR.rotation.x = -Math.sin(t * 10) * 0.5;
            }
        });
    }

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>

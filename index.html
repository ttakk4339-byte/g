<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CyberSteve: Battle Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #ui-layer { position: absolute; width: 100%; height: 100%; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); }
        .mc-btn { width: 300px; padding: 15px; margin: 5px; background: #4a4a4a; border: 2px solid #000; color: #fff; cursor: pointer; text-align: center; font-weight: bold; box-shadow: inset -3px -3px 0 #222, inset 3px 3px 0 #888; }
        .mc-btn:hover { background: #666; border-color: #fff; }
        
        #hud { position: absolute; width: 100%; height: 100%; pointer-events: none; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; transform: translate(-50%, -50%); mix-blend-mode: difference; }
        
        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.6); border: 3px solid #8b8b8b; padding: 2px; }
        .slot { width: 40px; height: 40px; border: 2px solid #444; margin: 2px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        .slot.active { border-color: #fff; background: rgba(255,255,255,0.2); }
        
        #hp-bar { position: absolute; bottom: 65px; left: 50%; transform: translateX(-150px); color: #ff0044; font-weight: bold; font-size: 20px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1 style="color: #fff; text-shadow: 4px 4px #444;">CYBER STEVE: ARENA</h1>
    <div class="mc-btn" onclick="controls.lock()">START GAME</div>
</div>

<div id="hud">
    <div id="crosshair"></div>
    <div id="hp-bar">❤ HP: <span id="hp-val">20</span></div>
    <div id="hotbar">
        <div class="slot active" id="slot0">⚒</div>
        <div class="slot" id="slot1">⚔</div>
        <div class="slot" id="slot2">🏹</div>
        <div class="slot" id="slot3">🍎</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);
scene.fog = new THREE.FogExp2(0x020208, 0.02);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);
const ui = document.getElementById('ui-layer');
const hud = document.getElementById('hud');

controls.addEventListener('lock', () => { ui.style.display = 'none'; hud.style.display = 'block'; });
controls.addEventListener('unlock', () => { ui.style.display = 'flex'; hud.style.display = 'none'; });

// --- СВЕТ ---
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const flashLight = new THREE.PointLight(0x00ffff, 1, 20);
camera.add(flashLight);
scene.add(camera);

// --- ГЕЙМПЛЕЙ СОСТОЯНИЕ ---
const player = { hp: 20, selectedSlot: 0, items: ['pickaxe', 'sword', 'bow', 'apple'] };
const enemies = [];
const keys = {};

// --- МОДЕЛЬ РУКИ СТИВА ---
const hand = new THREE.Group();
const arm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1), new THREE.MeshStandardMaterial({ color: 0x00acc1 }));
arm.position.set(0.5, -0.4, -0.5);
hand.add(arm);

const toolGroup = new THREE.Group();
const toolMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.1), new THREE.MeshStandardMaterial({ color: 0x8b4513 }));
toolMesh.position.set(0.5, -0.1, -1.0);
toolMesh.rotation.x = Math.PI/4;
toolGroup.add(toolMesh);
hand.add(toolGroup);
camera.add(hand);

// --- СОЗДАНИЕ АЛЕКС ---
function createAlex() {
    const alex = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0xff77ff });
    
    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.5), mat);
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
    head.position.y = 0.9;
    
    const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1, 0.4), new THREE.MeshStandardMaterial({ color: 0x3333ff }));
    lLeg.position.set(0.25, -1, 0);
    const rLeg = lLeg.clone(); rLeg.position.x = -0.25;
    
    alex.add(body, head, lLeg, rLeg);
    alex.position.set((Math.random()-0.5)*100, 1.5, (Math.random()-0.5)*100);
    
    scene.add(alex);
    alex.userData = { hp: 5, lLeg, rLeg, lastHit: 0 };
    enemies.push(alex);
}
for(let i=0; i<15; i++) createAlex();

// --- СИСТЕМА УДАРА ---
const raycaster = new THREE.Raycaster();
function attack() {
    // Анимация руки
    hand.rotation.x = 0.8;
    setTimeout(() => hand.rotation.x = 0, 150);

    // Рейкаст (куда смотрим)
    raycaster.setFromCamera({x: 0, y: 0}, camera);
    const hits = raycaster.intersectObjects(enemies, true);

    if(hits.length > 0) {
        let target = hits[0].object;
        while(target.parent && !enemies.includes(target)) target = target.parent;
        
        if(enemies.includes(target)) {
            target.userData.hp -= 2;
            target.userData.lastHit = Date.now();
            // Отдача (pushback)
            const dir = target.position.clone().sub(camera.position).normalize();
            target.position.addScaledVector(dir, 2);
            
            if(target.userData.hp <= 0) {
                scene.remove(target);
                enemies.splice(enemies.indexOf(target), 1);
                createAlex(); // Спавним новую
            }
        }
    }
}

// --- УПРАВЛЕНИЕ ---
window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if(e.key >= '1' && e.key <= '4') {
        player.selectedSlot = parseInt(e.key) - 1;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('slot' + player.selectedSlot).classList.add('active');
    }
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousedown', () => { if(controls.isLocked) attack(); });

// --- ГЛАВНЫЙ ЦИКЛ ---
const clock = new THREE.Clock();
function update() {
    requestAnimationFrame(update);
    const delta = clock.getDelta();
    const time = clock.getElapsedTime();

    if(controls.isLocked) {
        // Движение
        const speed = 0.2;
        if(keys['w']) controls.moveForward(speed);
        if(keys['s']) controls.moveForward(-speed);
        if(keys['a']) controls.moveRight(-speed);
        if(keys['d']) controls.moveRight(speed);

        // ИИ Алекс
        enemies.forEach(alex => {
            const dist = alex.position.distanceTo(camera.position);
            
            // Визуальный эффект получения урона (краснеет)
            const isHit = (Date.now() - alex.userData.lastHit < 200);
            alex.traverse(child => {
                if(child.isMesh) child.material.color.set(isHit ? 0xff0000 : (child.geometry.type === 'BoxGeometry' ? 0xff77ff : 0xffffff));
            });

            if(dist < 20) {
                const dir = camera.position.clone().sub(alex.position).normalize();
                alex.position.x += dir.x * 0.05;
                alex.position.z += dir.z * 0.05;
                alex.lookAt(camera.position.x, alex.position.y, camera.position.z);
                
                // Анимация ходьбы ног
                alex.userData.lLeg.rotation.x = Math.sin(time * 10) * 0.5;
                alex.userData.rLeg.rotation.x = -Math.sin(time * 10) * 0.5;

                // Урон игроку
                if(dist < 1.5 && Math.random() < 0.02) {
                    player.hp -= 1;
                    document.getElementById('hp-val').innerText = player.hp;
                    if(player.hp <= 0) location.reload();
                }
            }
        });
    }

    renderer.render(scene, camera);
}

// Пол и Здания
const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x111111 }));
ground.rotation.x = -Math.PI/2;
scene.add(ground);

update();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CYBER STEVE: PHYSICAL REVOLUTION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; }
        #overlay { position: absolute; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: #0ff; }
        .btn { padding: 20px 40px; border: 4px solid #0ff; background: none; color: #0ff; cursor: pointer; font-family: inherit; font-size: 20px; transition: 0.3s; }
        .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff; }
        #hud { position: absolute; width: 100%; height: 100%; pointer-events: none; display: none; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,255,255,0.15); border: 2px solid #0ff; padding: 5px; backdrop-filter: blur(5px); }
        .slot { width: 50px; height: 50px; border: 2px solid #333; margin: 0 5px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; }
        .slot.active { border-color: #0ff; background: rgba(0,255,255,0.3); box-shadow: 0 0 10px #0ff; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 15px; height: 15px; border: 2px solid #fff; border-radius: 50%; mix-blend-mode: difference; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="margin-bottom: 50px; text-shadow: 0 0 15px #0ff;">SYSTEM LOADING...</h1>
    <button class="btn" onclick="init()">BOOT STEVE.EXE</button>
</div>

<div id="hud">
    <div id="crosshair"></div>
    <div id="hotbar">
        <div class="slot active" id="s0">⚒</div>
        <div class="slot" id="s1">⚔</div>
        <div class="slot" id="s2">🔌</div>
        <div class="slot" id="s3">📦</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

let scene, camera, renderer, controls, clock;
let hand, currentItem, enemies = [];
let keys = {};
let mouseMovement = { x: 0, y: 0 };
const GRAVITY = 0.5;
let playerVelocity = new THREE.Vector3();

// Текстуры
const texLoader = new THREE.TextureLoader();
const pixelTex = (c1, c2) => {
    const canv = document.createElement('canvas'); canv.width = 8; canv.height = 8;
    const ctx = canv.getContext('2d');
    for(let i=0; i<8; i++) for(let j=0; j<8; j++) {
        ctx.fillStyle = Math.random() > 0.5 ? c1 : c2;
        ctx.fillRect(i, j, 1, 1);
    }
    const t = new THREE.CanvasTexture(canv); t.magFilter = THREE.NearestFilter; return t;
};

const skinTex = pixelTex('#ffdbac', '#e0ac69');
const steveTex = pixelTex('#00cccc', '#008888');

window.init = () => {
    setup();
    animate();
    controls.lock();
};

function setup() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x00050a);
    scene.fog = new THREE.FogExp2(0x00050a, 0.03);

    camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new PointerLockControls(camera, document.body);
    clock = new THREE.Clock();

    controls.addEventListener('lock', () => {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
    });

    // Свет
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const pLight = new THREE.PointLight(0x00ffff, 2, 25);
    camera.add(pLight);
    scene.add(camera);

    // Пол (Бесконечный)
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 0.5 }));
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    // Сетка
    const grid = new THREE.GridHelper(2000, 100, 0x00ffff, 0x111122);
    scene.add(grid);

    // Рука
    hand = new THREE.Group();
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1), new THREE.MeshStandardMaterial({map: steveTex}));
    arm.position.set(0.6, -0.5, -0.6);
    hand.add(arm);
    camera.add(hand);

    // Инструмент
    currentItem = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.9, 0.15), new THREE.MeshStandardMaterial({color: 0x00ffff, emissive: 0x00ffff}));
    currentItem.position.set(0.6, -0.2, -1.1);
    currentItem.rotation.x = Math.PI/4;
    hand.add(currentItem);

    for(let i=0; i<15; i++) spawnAlex();
    
    // Слежка за мышью для Sway
    document.addEventListener('mousemove', (e) => {
        mouseMovement.x = e.movementX;
        mouseMovement.y = e.movementY;
    });
}

function spawnAlex() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.4), new THREE.MeshStandardMaterial({color: 0xff00ff}));
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({map: skinTex}));
    head.position.y = 0.95;
    g.add(body, head);
    g.position.set((Math.random()-0.5)*100, 1.2, (Math.random()-0.5)*100);
    scene.add(g);
    enemies.push({mesh: g, hp: 5, lastHit: 0});
}

window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
window.onmousedown = () => { if(controls.isLocked) doAttack(); };

let attackT = 0;
function doAttack() {
    attackT = 1.0;
    // Рейкаст урона
    const ray = new THREE.Raycaster();
    ray.setFromCamera({x:0, y:0}, camera);
    const hits = ray.intersectObjects(scene.children, true);
    for(let h of hits) {
        let root = h.object; while(root.parent && root.parent !== scene) root = root.parent;
        let e = enemies.find(en => en.mesh === root);
        if(e && h.distance < 4) {
            e.hp -= 2; e.lastHit = Date.now();
            if(e.hp <= 0) { scene.remove(e.mesh); enemies.splice(enemies.indexOf(e), 1); spawnAlex(); }
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    if(controls.isLocked) {
        // --- ФИЗИКА И ЗАЩИТА ОТ ПРОВАЛИВАНИЯ ---
        const speed = keys['shift'] ? 0.3 : 0.15;
        if(keys['w']) controls.moveForward(speed);
        if(keys['s']) controls.moveForward(-speed);
        if(keys['a']) controls.moveRight(-speed);
        if(keys['d']) controls.moveRight(speed);

        // Фиксация высоты (Steve Height = 1.8)
        const groundHeight = 1.8;
        if (camera.position.y > groundHeight) playerVelocity.y -= GRAVITY * delta;
        camera.position.y += playerVelocity.y;

        if (camera.position.y < groundHeight) {
            camera.position.y = groundHeight;
            playerVelocity.y = 0;
        }

        // --- АНИМАЦИИ ПРЕДМЕТА ---
        // 1. Hand Sway (Занос при повороте)
        hand.position.x = THREE.MathUtils.lerp(hand.position.x, -mouseMovement.x * 0.001, 0.1);
        hand.position.y = THREE.MathUtils.lerp(hand.position.y, mouseMovement.y * 0.001, 0.1);
        mouseMovement.x *= 0.9; mouseMovement.y *= 0.9;

        // 2. View Bobbing (Тряска при ходьбе)
        const isMoving = keys['w'] || keys['s'] || keys['a'] || keys['d'];
        if(isMoving) {
            const bob = Math.sin(elapsed * 12) * 0.05;
            const tilt = Math.cos(elapsed * 12) * 0.02;
            hand.position.y += bob;
            camera.rotation.z = THREE.MathUtils.lerp(camera.rotation.z, tilt, 0.1);
            if(keys['shift']) camera.fov = THREE.MathUtils.lerp(camera.fov, 95, 0.1);
        } else {
            camera.rotation.z = THREE.MathUtils.lerp(camera.rotation.z, 0, 0.1);
            camera.fov = THREE.MathUtils.lerp(camera.fov, 85, 0.1);
        }
        camera.updateProjectionMatrix();

        // 3. Attack Animation
        if(attackT > 0) {
            attackT -= delta * 5;
            hand.rotation.x = Math.sin(attackT * Math.PI) * 1.5;
            hand.rotation.y = Math.sin(attackT * Math.PI) * 0.5;
        }

        // Враги (AI)
        enemies.forEach(e => {
            const dist = e.mesh.position.distanceTo(camera.position);
            const isHit = Date.now() - e.lastHit < 150;
            e.mesh.traverse(m => { if(m.isMesh) m.material.emissive?.setHex(isHit ? 0xff0000 : 0x000000); });

            if(dist < 20) {
                const dir = camera.position.clone().sub(e.mesh.position).setY(0).normalize();
                e.mesh.position.add(dir.multiplyScalar(0.04));
                e.mesh.lookAt(camera.position.x, 1.2, camera.position.z);
            }
        });
    }

    renderer.render(scene, camera);
}
</script>
</body>
</html>

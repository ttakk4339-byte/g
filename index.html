<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CyberCat: FIRST PERSON SURVIVAL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        
        /* ГЛАВНЫЙ МЕНЮ ОВЕРЛЕЙ */
        #ui-layer {
            position: absolute; width: 100%; height: 100%; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.9));
        }
        .mc-btn {
            width: 350px; height: 40px; margin: 5px; background: #4a4a4a; border: 2px solid #000;
            color: #e0e0e0; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; font-size: 16px;
            box-shadow: inset -2px -2px 0px #212121, inset 2px 2px 0px #8b8b8b;
        }
        .mc-btn:hover { background: #6b6b6b; color: #ffffa0; border-color: #fff; }

        /* ИГРОВОЙ ХАД (HUD) */
        #hud { position: absolute; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 1000; }
        
        /* Бар ХП (Сердечки) */
        #hp-bar { position: absolute; bottom: 60px; left: 50%; transform: translateX(-110px); display: flex; gap: 2px; }
        .heart { width: 18px; height: 18px; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABIAAAASCAYAAABWf95fAAAAAXNSR0IArs4c6QAAAHBJREFUOE9jZKAQMFKon2EUjIKhAQwMDIyMjIwM//8zMvz9z8jA8P8fIxfDf7B4fX0DIwPDf7B4fX0DMwNDf7B4fX0DMwNDf7B4fX0DMwNDf7B4fX0DMwNDf7B4fX0DMwNDf7B4fX0DIwNDf7B4fX0DIwND/wAAlY0+I8HwUf8AAAAASUVORK5CYII=') no-repeat; background-size: contain; }
        .heart.empty { background-position: -18px 0; } /* Упрощено для примера */

        /* Бар Голода */
        #hunger-bar { position: absolute; bottom: 60px; right: 50%; transform: translateX(110px); display: flex; gap: 2px; flex-direction: row-reverse; }
        .food { width: 18px; height: 18px; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABIAAAASCAYAAABWf95fAAAAAXNSR0IArs4c6QAAAGVJREFUOE9jZKAQMFKon2EUjIKhAQwMDIyMjIwM//8zMvz9z8jA8P8fIxfDf7B4fX0DIwPDf7B4fX0DMwNDf7B4fX0DMwNDf7B4fX0DMwNDf7B4fX0DMwNDf7B4fX0DMwNDf7B4fX0DIwNDf7B4fX0DIwND/wAAlY0+I8HwUf8AAAAASUVORK5CYII=') no-repeat; background-size: contain; filter: hue-rotate(90deg); }

        /* Бар Стамины */
        #stamina-bar { position: absolute; bottom: 90px; left: 50%; transform: translateX(-100px); width: 200px; height: 6px; background: #222; border: 1px solid #000; }
        #stamina-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.1s; }

        /* Хотбар (Ячейки) */
        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 364px; height: 44px; background: rgba(0,0,0,0.5); border: 4px solid #8b8b8b; display: flex; gap: 2px; padding: 2px; box-shadow: inset 2px 2px 0 #fff, inset -2px -2px 0 #000; }
        .slot { width: 36px; height: 36px; background: rgba(139,139,139,0.5); border: 2px solid #000; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .slot.selected { border-color: #fff; box-shadow: 0 0 5px #fff; }

        /* Прицел */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; transform: translate(-50%, -50%); mix-blend-mode: difference; color: white; font-size: 24px; font-weight: bold; }

        /* Эффект Урона */
        #damage-flash { position: absolute; width: 100%; height: 100%; background: rgba(255,0,0,0); pointer-events: none; transition: background 0.1s; z-index: 1500; }
    </style>
</head>
<body>

<div id="damage-flash"></div>

<div id="ui-layer">
    <h1 style="color: #fff; font-size: 64px; text-shadow: 4px 4px #000; margin-bottom: 50px;">CYBER STEVE</h1>
    <div class="mc-btn" onclick="startGame()">Singleplayer</div>
    <div class="mc-btn" onclick="window.location.reload()">Quit Game</div>
</div>

<div id="hud">
    <div id="crosshair">+</div>
    
    <div id="hp-bar">
        <div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div>
        <div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div>
    </div>
    
    <div id="stamina-bar"><div id="stamina-fill"></div></div>

    <div id="hunger-bar">
        <div class="food"></div><div class="food"></div><div class="food"></div><div class="food"></div><div class="food"></div>
        <div class="food"></div><div class="food"></div><div class="food"></div><div class="food"></div><div class="food"></div>
    </div>

    <div id="hotbar">
        <div class="slot selected">⚒️</div>
        <div class="slot">⚔️</div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// --- НАСТРОЙКИ И СОСТОЯНИЕ ---
const state = { 
    paused: true, 
    hp: 20, // 10 сердечек
    stamina: 100,
    hunger: 20,
    bobTime: 0
};
const CONFIG = { speed: 0.3, sprintSpeed: 0.5, enemyDamage: 2 };

// --- ДВИЖОК ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010103);
scene.fog = new THREE.FogExp2(0x010103, 0.015); // Густой туман

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.8, 0); // Высота глаз Стива

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ПЕРВОЕ ЛИЦО УПРАВЛЕНИЕ (PointerLock)
const controls = new PointerLockControls(camera, document.body);

// --- СВЕТ ---
scene.add(new THREE.AmbientLight(0x101020, 0.5));
const handLight = new THREE.PointLight(0x00ffff, 1, 15); // Свет от кирки
camera.add(handLight);
scene.add(camera);

// --- МИР (ПИКСЕЛЬНЫЙ ВИЗУАЛ) ---
const textureLoader = new THREE.TextureLoader();

// Сетка на пол (Кибер-текстура)
const groundGeo = new THREE.PlaneGeometry(500, 500);
const groundMat = new THREE.MeshStandardMaterial({ 
    color: 0x111111, metalness: 0.8, roughness: 0.2, emissive: 0x00ffff, emissiveIntensity: 0.02 
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Здания-коробки
const buildings = [];
for(let i=0; i<100; i++) {
    const h = 20 + Math.random()*80;
    const w = 10 + Math.random()*15;
    const b = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, w),
        new THREE.MeshStandardMaterial({ color: 0x05050a, emissive: 0x0055ff, emissiveIntensity: 0.1 })
    );
    b.position.set((Math.random()-0.5)*300, h/2, (Math.random()-0.5)*300);
    scene.add(b);
    b.userData.box = new THREE.Box3().setFromObject(b);
    buildings.push(b);
}

// --- РУКА И ОРУЖИЕ (Вид от первого лица) ---
const handGroup = new THREE.Group();
const armMat = new THREE.MeshStandardMaterial({ color: 0x00cccc }); // Рука Стива
const arm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), armMat);
arm.position.set(0.6, -0.6, -0.8);
arm.rotation.x = -Math.PI / 4;
handGroup.add(arm);

// Пиксельная кирка (из блоков)
const pickaxe = new THREE.Group();
const pickMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8 });
const stick = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 0.1), new THREE.MeshStandardMaterial({ color: 0x8b4513 }));
pickaxe.add(stick);
const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.15, 0.2), pickMat);
head.position.y = 0.5;
pickaxe.add(head);
pickaxe.position.set(0.6, -0.3, -1.2);
pickaxe.rotation.set(-Math.PI/4, 0, Math.PI/4);
handGroup.add(pickaxe);

camera.add(handGroup);

// --- ВРАГИ (АЛЕКС-ЗОМБИ) ---
const enemies = [];
const alexMat = new THREE.MeshStandardMaterial({ color: 0xff44ff, emissive: 0xff00ff, emissiveIntensity: 0.2 }); // Алекс
const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 5 });

function spawnAlex() {
    const alex = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, 0.5), alexMat);
    alex.add(body);
    // Глаза
    const e1 = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.2), eyeMat); e1.position.set(0.2, 0.6, 0.3); alex.add(e1);
    const e2 = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.2), eyeMat); e2.position.set(-0.2, 0.6, 0.3); alex.add(e2);
    
    // Позиция спавна вдали от игрока
    const angle = Math.random() * Math.PI * 2;
    const dist = 50 + Math.random() * 50;
    alex.position.set(Math.cos(angle)*dist, 0.9, Math.sin(angle)*dist);
    
    scene.add(alex);
    alex.userData = { box: new THREE.Box3(), health: 6, attackTimer: 0 };
    enemies.push(alex);
}
// Спавним 10 Алекс
for(let i=0; i<10; i++) spawnAlex();

// --- УПРАВЛЕНИЕ И ЛОГИКА ---
const keys = {};
window.addEventListener('keydown', e => {
    if(e.key === 'Escape') togglePause();
    keys[e.key.toLowerCase()] = true;
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Клик для атаки
window.addEventListener('mousedown', () => {
    if(!state.paused) {
        // Визуальная атака рукой
        handGroup.rotation.x = 0.5;
        setTimeout(() => handGroup.rotation.x = 0, 150);
        // Логика атаки врага (рейкаст)
    }
});

window.startGame = () => { controls.lock(); };
controls.addEventListener('lock', () => { state.paused = false; uiLayer.style.display = 'none'; hud.style.display = 'block'; });
controls.addEventListener('unlock', () => { state.paused = true; uiLayer.style.display = 'flex'; hud.style.display = 'none'; });

const uiLayer = document.getElementById('ui-layer');
const hud = document.getElementById('hud');

function togglePause() {
    if(state.paused) controls.lock(); else controls.unlock();
}

// Принятие урона
function takeDamage(amount) {
    state.hp -= amount;
    // Обновление HUD
    updateHud();
    // Эффект красного экрана
    const flash = document.getElementById('damage-flash');
    flash.style.background = 'rgba(255,0,0,0.5)';
    setTimeout(() => flash.style.background = 'rgba(255,0,0,0)', 150);
    // Тряска камеры
    camera.rotation.z = (Math.random()-0.5)*0.1;
    
    if(state.hp <= 0) {
        alert("ГЕЙМ ОВЕР! Ты пал от рук Алекс.");
        window.location.reload();
    }
}

function updateHud() {
    const hearts = document.querySelectorAll('#hp-bar .heart');
    hearts.forEach((h, i) => {
        const hpVal = (i + 1) * 2;
        if(hpVal <= state.hp) h.className = 'heart'; // Полное
        else if(hpVal - 1 <= state.hp) h.className = 'heart half'; // Половина (пока нет текстуры)
        else h.className = 'heart empty'; // Пустое
    });
    document.getElementById('stamina-fill').style.width = state.stamina + '%';
}

// --- ЦИКЛ АНИМАЦИИ ---
const clock = new THREE.Clock();
const moveVec = new THREE.Vector3();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    if(!state.paused) {
        const time = clock.getElapsedTime();
        
        // 1. Управление (WASD)
        const curSpeed = keys['shift'] && state.stamina > 10 ? CONFIG.sprintSpeed : CONFIG.speed;
        if(keys['shift'] && state.stamina > 0) state.stamina -= 30 * delta; 
        else if(state.stamina < 100) state.stamina += 10 * delta;

        moveVec.set(0,0,0);
        if(keys['w']) moveVec.z -= 1;
        if(keys['s']) moveVec.z += 1;
        if(keys['a']) moveVec.x -= 1;
        if(keys['d']) moveVec.x += 1;
        moveVec.normalize();

        // Движение относительно взгляда
        controls.moveRight(moveVec.x * curSpeed);
        controls.moveForward(-moveVec.z * curSpeed);

        // Коллизии игрока
        const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(1, 2, 1));
        buildings.forEach(b => {
            if(pBox.intersectsBox(b.userData.box)) {
                // Упрощенный отскок
                controls.moveForward(moveVec.z * curSpeed * 1.5);
                controls.moveRight(-moveVec.x * curSpeed * 1.5);
            }
        });

        // 2. Покачивание рук при ходьбе (ViewBobbing)
        if(moveVec.length() > 0) {
            state.bobTime += delta * 8;
            handGroup.position.y = Math.sin(state.bobTime) * 0.05 - 0.1;
            handGroup.position.x = Math.cos(state.bobTime * 0.5) * 0.03;
        } else {
            handGroup.position.y = THREE.MathUtils.lerp(handGroup.position.y, -0.1, 0.1);
        }

        // 3. ИИ Врагов (Алекс)
        enemies.forEach(alex => {
            alex.userData.attackTimer -= delta;
            
            const dist = alex.position.distanceTo(camera.position);
            
            // Если близко - преследует
            if(dist < 30) {
                const dir = camera.position.clone().sub(alex.position);
                dir.y = 0; dir.normalize();
                alex.position.add(dir.multiplyScalar(delta * 4)); // Скорость Алекс
                alex.lookAt(camera.position.x, alex.position.y, camera.position.z);
                
                // Атака
                if(dist < 2 && alex.userData.attackTimer <= 0) {
                    takeDamage(CONFIG.enemyDamage);
                    alex.userData.attackTimer = 1.5; // Кулдаун атаки
                }
            }
            
            alex.userData.box.setFromObject(alex); // Обновляем хитбокс
        });

        updateHud();
    }

    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CyberCat Stray</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial;}
#ui{position:absolute;top:10px;left:10px;color:white;z-index:10;font-size:18px;}
#inventory{position:absolute;top:60px;left:10px;color:white;}
#quest{position:absolute;top:110px;left:10px;color:#0ff;}
</style>
</head>
<body>
<div id="ui">🐟 Рыба: <span id="fish">0</span></div>
<div id="inventory">🎒 Инвентарь<div id="items"></div></div>
<div id="quest">📜 Квест: собрать 5 рыб</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Основные объекты
let scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);

let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,6,12);

let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enablePan=false; controls.maxDistance=30; controls.minDistance=8; controls.maxPolarAngle=Math.PI/2;

// Свет
let ambient=new THREE.AmbientLight(0xffffff,0.6); scene.add(ambient);
let light=new THREE.PointLight(0x00ffff,1.5,500); light.position.set(0,50,0); scene.add(light);

// Пол
let groundMat=new THREE.MeshStandardMaterial({color:0x080820,roughness:0.5,metalness:0.1});
let ground=new THREE.Mesh(new THREE.PlaneGeometry(1000,1000),groundMat);
ground.rotation.x=-Math.PI/2; scene.add(ground);

// Кот (GLTF модель)
let cat,mixer;
let loader=new THREE.GLTFLoader();
loader.load('https://models.babylonjs.com/Cat.glb',function(gltf){
    cat=gltf.scene; cat.scale.set(0.5,0.5,0.5); cat.position.y=0; scene.add(cat);
    mixer=new THREE.AnimationMixer(cat); gltf.animations.forEach(clip=>{mixer.clipAction(clip).play();});
});

// Города и здания
let buildings=[];
for(let i=0;i<100;i++){
    let geo=new THREE.BoxGeometry(5+Math.random()*20,20+Math.random()*80,5+Math.random()*20);
    let mat=new THREE.MeshStandardMaterial({color:0x111133,emissive:0x001122});
    let b=new THREE.Mesh(geo,mat); b.position.x=Math.random()*400-200; b.position.z=Math.random()*400-200; b.position.y=geo.parameters.height/2;
    scene.add(b); b.box=new THREE.Box3().setFromObject(b); buildings.push(b);
}

// Дождь
let rainGeo=new THREE.BufferGeometry();
let rainCount=1500; let rainVertices=[];
for(let i=0;i<rainCount;i++){ rainVertices.push(Math.random()*400-200,Math.random()*100,Math.random()*400-200); }
rainGeo.setAttribute('position',new THREE.Float32BufferAttribute(rainVertices,3));
let rainMat=new THREE.PointsMaterial({color:0x00ffff,size:0.2,transparent:true});
let rain=new THREE.Points(rainGeo,rainMat); scene.add(rain);

// Управление
let keys={}; document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

let speed=0.1; let inventory={fish:0}; let quest={target:5,done:false};

function updateUI(){
    document.getElementById("fish").innerText=inventory.fish;
    document.getElementById("items").innerHTML="🐟 Рыба x"+inventory.fish;
    if(inventory.fish>=quest.target && !quest.done){
        quest.done=true; document.getElementById("quest").innerText="✅ Квест выполнен!";
    }
}

// Основной цикл
let clock=new THREE.Clock();
function animate(){
    requestAnimationFrame(animate);
    let delta=clock.getDelta();
    if(mixer) mixer.update(delta);

    // Движение кота
    if(cat){
        let newX=cat.position.x,newZ=cat.position.z;
        if(keys['w']) newZ-=speed; if(keys['s']) newZ+=speed;
        if(keys['a']) newX-=speed; if(keys['d']) newX+=speed;

        // Коллизии с зданиями
        let playerBox=new THREE.Box3(new THREE.Vector3(newX-0.5,0,newZ-0.5), new THREE.Vector3(newX+0.5,2,newZ+0.5));
        let collision=false; buildings.forEach(b=>{if(playerBox.intersectsBox(b.box)) collision=true;});
        if(!collision){ cat.position.x=newX; cat.position.z=newZ; }
    }

    // Камера
    if(cat) controls.target.copy(cat.position);
    controls.update();

    // Дождь
    let positions=rain.geometry.attributes.position.array;
    for(let i=1;i<positions.length;i+=3){ positions[i]-=0.5; if(positions[i]<0) positions[i]=100; }
    rain.geometry.attributes.position.needsUpdate=true;

    renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>

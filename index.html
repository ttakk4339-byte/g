<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STEVE_PROTOCOL_V9_STABLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;700&display=swap');
        body { margin: 0; background: #000; color: #0ff; font-family: 'Fira Code', monospace; overflow: hidden; }
        #overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent, #000); pointer-events: none; z-index: 5; }
        
        /* HUD */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: none; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; }
        .crosshair:before { content: ''; position: absolute; top: 9px; width: 20px; height: 2px; background: #0ff; box-shadow: 0 0 5px #0ff; }
        .crosshair:after { content: ''; position: absolute; left: 9px; width: 2px; height: 20px; background: #0ff; box-shadow: 0 0 5px #0ff; }

        .stat-box { position: absolute; padding: 15px; background: rgba(0,20,30,0.8); border-left: 5px solid #0ff; }
        #health-ui { bottom: 40px; left: 40px; width: 250px; }
        #ammo-ui { bottom: 40px; right: 40px; text-align: right; border-left: none; border-right: 5px solid #0ff; }
        
        .bar-bg { width: 100%; height: 10px; background: #002; margin-top: 10px; }
        #hp-fill { width: 100%; height: 100%; background: #f0f; transition: 0.2s; box-shadow: 0 0 10px #f0f; }

        /* MENU */
        #start-screen { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 10px solid #001; }
        .glitch-btn { padding: 20px 50px; background: none; border: 2px solid #0ff; color: #0ff; font-family: 'Fira Code'; font-size: 24px; cursor: pointer; text-shadow: 0 0 10px #0ff; transition: 0.3s; }
        .glitch-btn:hover { background: #0ff; color: #000; box-shadow: 0 0 30px #0ff; }

        #debug-info { position: absolute; top: 10px; left: 10px; font-size: 10px; color: rgba(0,255,255,0.4); }
    </style>
</head>
<body>

<div id="overlay"></div>
<div id="debug-info">FPS: 60 | ENGINE: V9_STABLE | CAMERA: ACTIVE</div>

<div id="start-screen">
    <h1 style="font-size: 60px; margin-bottom: 40px;">CORE_STEVE_OS</h1>
    <button class="glitch-btn" onclick="Game.init()">BOOT SYSTEM</button>
</div>

<div id="hud">
    <div class="crosshair"></div>
    <div id="health-ui" class="stat-box">
        <div style="font-size: 12px; letter-spacing: 2px;">VITAL_SIGNS</div>
        <div class="bar-bg"><div id="hp-fill"></div></div>
    </div>
    <div id="ammo-ui" class="stat-box">
        <div style="font-size: 12px; letter-spacing: 2px;">AMMO_RESERVE</div>
        <div style="font-size: 30px; font-weight: bold;"><span id="cur-ammo">30</span>/INF</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

/**
 * ============================================================================
 * HIGH-PERFORMANCE GAME ENGINE
 * ============================================================================
 */

const Game = {
    // Конфигурация
    cfg: {
        playerHeight: 1.8,
        gravity: 0.008,
        jumpForce: 0.16,
        moveSpeed: 0.15,
        sprintMult: 1.8,
        sens: 0.002
    },

    init() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'block';

        this.clock = new THREE.Clock();
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000208);
        this.scene.fog = new THREE.FogExp2(0x000208, 0.03);

        this.camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1500);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(this.renderer.domElement);

        // Ключевой фикс камеры: Контроллер теперь управляет только вращением
        this.controls = new PointerLockControls(this.camera, document.body);
        this.controls.lock();

        this.setupPhysics();
        this.setupEnvironment();
        this.setupPlayerAssets();
        this.setupEnemies();
        this.bindEvents();

        this.loop();
    },

    setupPhysics() {
        this.player = {
            pos: new THREE.Vector3(0, this.cfg.playerHeight, 0),
            vel: new THREE.Vector3(),
            onGround: true,
            hp: 100,
            ammo: 30,
            isFiring: false
        };
        this.keys = {};
    },

    setupEnvironment() {
        // Неоновый пол
        const floorGeo = new THREE.PlaneGeometry(2000, 2000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.5 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        this.scene.add(floor);

        const grid = new THREE.GridHelper(2000, 100, 0x00ffff, 0x002222);
        this.scene.add(grid);

        // Освещение
        const amb = new THREE.AmbientLight(0xffffff, 0.2);
        this.scene.add(amb);

        this.eyeLight = new THREE.PointLight(0x00ffff, 5, 20);
        this.camera.add(this.eyeLight);
        this.scene.add(this.camera);

        // Генерация зданий
        for(let i=0; i<120; i++) {
            const h = 20 + Math.random() * 100;
            const b = new THREE.Mesh(
                new THREE.BoxGeometry(10, h, 10),
                new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x00ffff, emissiveIntensity: 0.1 })
            );
            b.position.set((Math.random()-0.5)*1000, h/2, (Math.random()-0.5)*1000);
            this.scene.add(b);
        }
    },

    setupPlayerAssets() {
        // Оружие (Cyber Rifle)
        this.gunPivot = new THREE.Group();
        this.camera.add(this.gunPivot);
        
        const gunBody = new THREE.Mesh(
            new THREE.BoxGeometry(0.15, 0.2, 1),
            new THREE.MeshStandardMaterial({ color: 0x222222 })
        );
        const barrel = new THREE.Mesh(
            new THREE.CylinderGeometry(0.03, 0.03, 0.5),
            new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff })
        );
        barrel.rotation.x = Math.PI/2;
        barrel.position.z = -0.5;
        
        this.gunModel = new THREE.Group();
        this.gunModel.add(gunBody, barrel);
        this.gunModel.position.set(0.4, -0.4, -0.5);
        this.gunPivot.add(this.gunModel);

        // Вспышка выстрела
        this.muzzleFlash = new THREE.PointLight(0x00ffff, 0, 10);
        this.muzzleFlash.position.set(0.4, -0.4, -1.2);
        this.camera.add(this.muzzleFlash);
    },

    setupEnemies() {
        this.enemies = [];
        for(let i=0; i<30; i++) {
            const alex = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.4), new THREE.MeshStandardMaterial({color: 0xff00ff}));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1;
            alex.add(body, head);
            alex.position.set((Math.random()-0.5)*600, 0.7, (Math.random()-0.5)*600);
            this.scene.add(alex);
            this.enemies.push({ mesh: alex, hp: 50, lastAttack: 0 });
        }
    },

    bindEvents() {
        window.onkeydown = (e) => this.keys[e.code] = true;
        window.onkeyup = (e) => this.keys[e.code] = false;
        window.onmousedown = () => this.fire();
        window.onresize = () => {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        };
    },

    fire() {
        if(!this.controls.isLocked || this.player.ammo <= 0) return;

        this.player.ammo--;
        document.getElementById('cur-ammo').innerText = this.player.ammo;

        // Эффект отдачи
        this.gunModel.position.z += 0.1;
        this.muzzleFlash.intensity = 15;
        setTimeout(() => this.muzzleFlash.intensity = 0, 50);

        // Raycasting
        const ray = new THREE.Raycaster();
        ray.setFromCamera({x:0, y:0}, this.camera);
        const hits = ray.intersectObjects(this.scene.children, true);

        for(let hit of hits) {
            let target = hit.object;
            while(target.parent && target.parent !== this.scene) target = target.parent;
            const enemy = this.enemies.find(e => e.mesh === target);
            if(enemy && hit.distance < 100) {
                enemy.hp -= 25;
                if(enemy.hp <= 0) {
                    this.scene.remove(target);
                    this.enemies = this.enemies.filter(e => e !== enemy);
                }
                break;
            }
        }
    },

    update(delta) {
        if(!this.controls.isLocked) return;

        // --- ОБРАБОТКА ФИЗИКИ КАМЕРЫ ---
        const speed = (this.keys['ShiftLeft'] ? this.cfg.moveSpeed * this.cfg.sprintMult : this.cfg.moveSpeed);
        
        // Вектор направления
        const moveDir = new THREE.Vector3();
        if(this.keys['KeyW']) moveDir.z -= 1;
        if(this.keys['KeyS']) moveDir.z += 1;
        if(this.keys['KeyA']) moveDir.x -= 1;
        if(this.keys['KeyD']) moveDir.x += 1;
        
        moveDir.normalize();
        this.controls.moveRight(moveDir.x * speed);
        this.controls.moveForward(-moveDir.z * speed);

        // Прыжок и Гравитация
        if(this.keys['Space'] && this.player.onGround) {
            this.player.vel.y = this.cfg.jumpForce;
            this.player.onGround = false;
        }

        this.player.vel.y -= this.cfg.gravity;
        this.camera.position.y += this.player.vel.y;

        // Фиксация пола (Anti-Glitch)
        if(this.camera.position.y < this.cfg.playerHeight) {
            this.camera.position.y = this.cfg.playerHeight;
            this.player.vel.y = 0;
            this.player.onGround = true;
        }

        // --- СИНХРОНИЗАЦИЯ ОРУЖИЯ (SWAY) ---
        const time = performance.now() * 0.005;
        this.gunModel.position.z = THREE.MathUtils.lerp(this.gunModel.position.z, -0.5, 0.1);
        
        // Качание при ходьбе
        if(moveDir.length() > 0) {
            const bob = Math.sin(time * 2) * 0.02;
            this.gunPivot.position.y = bob;
            this.gunPivot.rotation.z = Math.sin(time) * 0.01;
        } else {
            this.gunPivot.position.y = THREE.MathUtils.lerp(this.gunPivot.position.y, 0, 0.1);
        }

        // Враги (AI)
        this.enemies.forEach(e => {
            const dist = e.mesh.position.distanceTo(this.camera.position);
            if(dist < 50) {
                e.mesh.lookAt(this.camera.position.x, 0.7, this.camera.position.z);
                const dir = this.camera.position.clone().sub(e.mesh.position).normalize();
                e.mesh.position.add(dir.multiplyScalar(0.06));
                
                if(dist < 3 && Date.now() - e.lastAttack > 1500) {
                    this.player.hp -= 10;
                    e.lastAttack = Date.now();
                    document.getElementById('hp-fill').style.width = this.player.hp + "%";
                }
            }
        });

        if(this.player.hp <= 0) location.reload();
    },

    loop() {
        requestAnimationFrame(() => this.loop());
        const delta = this.clock.getDelta();
        this.update(delta);
        this.renderer.render(this.scene, this.camera);
    }
};

window.Game = Game;
</script>
</body>
</html>

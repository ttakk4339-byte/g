<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CyberCat - MC Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; }
        
        /* ГЛАВНЫЙ ОВЕРЛЕЙ */
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }

        /* КНОПКИ В СТИЛЕ MC */
        .mc-btn {
            width: 400px; height: 40px; margin: 4px;
            background: #4a4a4a; border: 2px solid #000;
            color: #e0e0e0; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; font-weight: bold; font-size: 16px;
            box-shadow: inset -2px -2px 0px #212121, inset 2px 2px 0px #8b8b8b;
        }
        .mc-btn:hover { background: #6b6b6b; color: #ffffa0; border-color: #fff; }
        .mc-btn:active { box-shadow: inset 2px 2px 0px #212121, inset -2px -2px 0px #8b8b8b; }

        .title-box { margin-bottom: 60px; text-align: center; }
        .main-title { font-size: 72px; color: #fff; text-shadow: 5px 5px #3f3f3f; letter-spacing: 5px; font-weight: 900; }
        .splash { color: #ffff00; font-size: 20px; transform: rotate(-20deg); display: inline-block; animation: bounce 0.4s infinite alternate; text-shadow: 2px 2px #3f3f00; }
        
        @keyframes bounce { from { transform: rotate(-20deg) scale(1); } to { transform: rotate(-20deg) scale(1.15); } }

        /* ОКНО НАСТРОЕК */
        #settings-screen { display: none; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .setting-item { width: 300px; display: flex; flex-direction: column; align-items: center; color: #aaa; }
        input[type=range] { width: 100%; cursor: pointer; }

        /* ИГРОВОЙ ХАД */
        #hud { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; display: none; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; transform: translate(-50%, -50%); border-radius: 50%; mix-blend-mode: difference; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="main-menu">
        <div class="title-box">
            <div class="main-title">CYBER CAT</div>
            <div class="splash">MADE BY GEMINI!</div>
        </div>
        <div class="mc-btn" onclick="play()">Singleplayer</div>
        <div class="mc-btn" onclick="openSettings()">Options...</div>
        <div class="mc-btn" style="color: #777; cursor: not-allowed;">Multiplayer (Soon)</div>
        <div class="mc-btn" onclick="window.location.reload()">Quit Game</div>
    </div>

    <div id="settings-screen">
        <h2 style="color: white; margin-bottom: 30px;">Options</h2>
        <div class="settings-grid">
            <div class="setting-item">
                <label>FOV: <span id="fov-val">75</span></label>
                <input type="range" id="fov" min="30" max="110" value="75">
            </div>
            <div class="setting-item">
                <label>Graphics: <span id="gfx-val">Fancy</span></label>
                <div class="mc-btn" style="width: 200px;" onclick="toggleGfx()">Fancy</div>
            </div>
            <div class="setting-item">
                <label>Render Distance: <span id="dist-val">Normal</span></label>
                <input type="range" id="dist" min="1" max="3" value="2">
            </div>
            <div class="setting-item">
                <label>Music & Sounds</label>
                <div class="mc-btn" style="width: 200px; color: #555;">Disabled</div>
            </div>
        </div>
        <div class="mc-btn" onclick="closeSettings()">Done</div>
    </div>
</div>

<div id="hud">
    <div style="font-size: 24px; text-shadow: 2px 2px #000;">🐟 Energy: <span id="score">0</span></div>
</div>
<div class="crosshair" id="cross" style="display:none"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// --- ДВИЖОК ---
const state = { paused: true, score: 0, fancy: true };
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ReinhardToneMapping;
document.body.appendChild(renderer.domElement);

// Свечение
const composer = new EffectComposer(renderer);
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(bloomPass);

// --- МИР ---
scene.background = new THREE.Color(0x020205);
const fog = new THREE.FogExp2(0x020205, 0.01);
scene.fog = fog;

const ambient = new THREE.AmbientLight(0x4040ff, 0.5);
scene.add(ambient);

const grid = new THREE.GridHelper(1000, 100, 0x00ffff, 0x111122);
grid.position.y = 0.05;
scene.add(grid);

const buildings = [];
for(let i=0; i<80; i++) {
    const h = 20 + Math.random()*60;
    const b = new THREE.Mesh(
        new THREE.BoxGeometry(10, h, 10),
        new THREE.MeshStandardMaterial({ color: 0x050510, emissive: 0x00ffff, emissiveIntensity: 0.1 })
    );
    b.position.set((Math.random()-0.5)*400, h/2, (Math.random()-0.5)*400);
    scene.add(b);
    b.userData.box = new THREE.Box3().setFromObject(b);
    buildings.push(b);
}

// Кот
const cat = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 3), new THREE.MeshStandardMaterial({ color: 0xff8800 }));
cat.add(body);
cat.position.y = 0.5;
scene.add(cat);

// --- УПРАВЛЕНИЕ ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.enableDamping = true;
camera.position.set(0, 10, 15);

const keys = {};
window.addEventListener('keydown', e => {
    if(e.key === 'Escape') togglePause();
    keys[e.key.toLowerCase()] = true;
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// --- ЛОГИКА МЕНЮ ---
window.play = () => {
    state.paused = false;
    document.getElementById('ui-layer').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('cross').style.display = 'block';
};

function togglePause() {
    state.paused = !state.paused;
    document.getElementById('ui-layer').style.display = state.paused ? 'flex' : 'none';
}

window.openSettings = () => {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('settings-screen').style.display = 'flex';
};

window.closeSettings = () => {
    document.getElementById('settings-screen').style.display = 'none';
    document.getElementById('main-menu').style.display = 'flex';
};

window.toggleGfx = () => {
    state.fancy = !state.fancy;
    document.getElementById('gfx-val').innerText = state.fancy ? 'Fancy' : 'Fast';
    bloomPass.enabled = state.fancy;
};

// Настройки ползунков
document.getElementById('fov').oninput = (e) => {
    camera.fov = e.target.value;
    camera.updateProjectionMatrix();
    document.getElementById('fov-val').innerText = e.target.value;
};

document.getElementById('dist').oninput = (e) => {
    const val = e.target.value;
    const labels = ["Short", "Normal", "Far"];
    document.getElementById('dist-val').innerText = labels[val-1];
    fog.density = 0.05 / val;
};

// --- ЦИКЛ ---
function animate() {
    requestAnimationFrame(animate);

    if(!state.paused) {
        const speed = 0.5;
        const camDir = new THREE.Vector3();
        camera.getWorldDirection(camDir);
        camDir.y = 0; camDir.normalize();
        const camSide = new THREE.Vector3().crossVectors(camDir, new THREE.Vector3(0,1,0)).normalize();

        const move = new THREE.Vector3(0,0,0);
        if(keys['w']) move.add(camDir);
        if(keys['s']) move.sub(camDir);
        if(keys['a']) move.add(camSide);
        if(keys['d']) move.sub(camSide);

        if(move.length() > 0) {
            move.normalize().multiplyScalar(speed);
            const nextPos = cat.position.clone().add(move);
            
            // Коллизии
            const catBox = new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(2.1, 1, 3.1));
            const collided = buildings.some(b => catBox.intersectsBox(b.userData.box));
            
            if(!collided) {
                cat.position.copy(nextPos);
                const targetAngle = Math.atan2(move.x, move.z) + Math.PI;
                cat.rotation.y = THREE.MathUtils.lerp(cat.rotation.y, targetAngle, 0.15);
            }
        }
        
        controls.target.lerp(cat.position, 0.1);
    }

    controls.update();
    if(state.fancy) composer.render();
    else renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

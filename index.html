<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STEVE_ULTRA_STABLE_V11</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body { margin: 0; background: #000; color: #0ff; font-family: 'Fira Code', monospace; overflow: hidden; }
        
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: none; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(0,255,255,0.5); transform: translate(-50%, -50%); border-radius: 50%; }
        
        .ui-bottom { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box; }
        .stat-card { background: rgba(0,10,20,0.9); border: 2px solid #0ff; padding: 20px; min-width: 200px; box-shadow: 0 0 20px rgba(0,255,255,0.2); }
        
        #hp-bar { width: 100%; height: 10px; background: #002; margin-top: 10px; border: 1px solid #f0f; }
        #hp-fill { width: 100%; height: 100%; background: #f0f; transition: 0.1s; }
        
        #reload-bar { height: 4px; background: #0ff; width: 0%; margin-top: 10px; transition: opacity 0.3s; }

        #boot-screen { position: absolute; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 20px 40px; background: none; border: 2px solid #0ff; color: #0ff; cursor: pointer; font-size: 20px; font-family: inherit; }
        .btn:hover { background: #0ff; color: #000; }
    </style>
</head>
<body>

<div id="boot-screen">
    <h1 style="font-size: 40px;">CRITICAL_PATCH_V11.0.4</h1>
    <p>CAMERA_STABILIZATION: [FIXED]</p>
    <p>WEAPON_PROCEDURAL_ANIM: [ENABLED]</p>
    <button class="btn" onclick="Core.start()">INITIATE_LINK</button>
</div>

<div id="hud">
    <div class="crosshair"></div>
    <div id="wave-info" style="position:absolute; top:40px; left:50%; transform:translateX(-50%); text-align:center;">
        <div style="font-size: 24px;">WAVE: <span id="wave-num">1</span></div>
        <div style="font-size: 12px; color: #f0f;">THREAT_LEVEL: <span id="threat">LOW</span></div>
    </div>
    
    <div class="ui-bottom">
        <div class="stat-card">
            <div>USER_INTEGRITY</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
        </div>
        <div class="stat-card" style="text-align: right;">
            <div style="font-size: 12px;">CYBER_RIFLE_v4</div>
            <div style="font-size: 32px;"><span id="ammo-cur">30</span><span style="font-size: 16px; opacity: 0.5;"> / 30</span></div>
            <div id="reload-bar"></div>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

const Core = {
    settings: {
        moveSpeed: 0.15,
        jumpPower: 0.18,
        gravity: 0.008,
        lookSense: 0.002
    },

    state: {
        hp: 100,
        ammo: 30,
        isReloading: false,
        wave: 1,
        enemiesKilled: 0,
        spawnRate: 3000 // мс
    },

    init() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000205);
        this.scene.fog = new THREE.FogExp2(0x000205, 0.025);

        this.camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(this.renderer.domElement);

        this.controls = new PointerLockControls(this.camera, document.body);
        this.clock = new THREE.Clock();
        this.keys = {};

        this.setupLights();
        this.setupPlayer();
        this.setupEnvironment();
        this.bindEvents();
        
        this.enemies = [];
        this.particles = [];
    },

    setupLights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        this.muzzleFlash = new THREE.PointLight(0x00ffff, 0, 15);
        this.camera.add(this.muzzleFlash);
        this.scene.add(this.camera);
    },

    setupPlayer() {
        // Оружейная группа (для Sway и Bobbing)
        this.weaponRoot = new THREE.Group();
        this.weaponSway = new THREE.Group();
        
        // Модель оружия
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.2, 0.7), new THREE.MeshStandardMaterial({color: 0x111111}));
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4), new THREE.MeshStandardMaterial({color: 0x00ffff, emissive: 0x00ffff}));
        barrel.rotation.x = Math.PI/2;
        barrel.position.z = -0.4;
        
        this.weaponModel = new THREE.Group();
        this.weaponModel.add(body, barrel);
        this.weaponModel.position.set(0.4, -0.4, -0.6);
        
        this.weaponSway.add(this.weaponModel);
        this.weaponRoot.add(this.weaponSway);
        this.camera.add(this.weaponRoot);

        this.playerPhys = { vel: new THREE.Vector3(), onGround: true };
    },

    setupEnvironment() {
        const grid = new THREE.GridHelper(2000, 100, 0x00ffff, 0x002222);
        this.scene.add(grid);

        // Здания
        const geo = new THREE.BoxGeometry(1, 1, 1);
        for(let i=0; i<80; i++) {
            const h = 20 + Math.random()*100;
            const b = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0x000000, emissive: 0x00ffff, emissiveIntensity: 0.1}));
            b.scale.set(10, h, 10);
            b.position.set((Math.random()-0.5)*800, h/2, (Math.random()-0.5)*800);
            this.scene.add(b);
        }
    },

    bindEvents() {
        window.onkeydown = (e) => this.keys[e.code] = true;
        window.onkeyup = (e) => this.keys[e.code] = false;
        window.onmousedown = () => this.shoot();
        
        // Таймер сложности
        setInterval(() => {
            this.state.wave++;
            this.state.spawnRate = Math.max(500, this.state.spawnRate - 300);
            document.getElementById('wave-num').innerText = this.state.wave;
            if(this.state.wave > 5) document.getElementById('threat').innerText = "HIGH";
        }, 30000);

        // Спавнер
        const spawnLoop = () => {
            if(this.controls.isLocked && this.enemies.length < 50 + (this.state.wave * 10)) {
                this.spawnNPC();
            }
            setTimeout(spawnLoop, this.state.spawnRate);
        };
        spawnLoop();
    },

    spawnNPC() {
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.6, 0.4), new THREE.MeshStandardMaterial({color: 0xff00ff}));
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.1;
        group.add(body, head);
        
        const angle = Math.random() * Math.PI * 2;
        const dist = 50 + Math.random()*20;
        group.position.set(Math.cos(angle)*dist, 0.8, Math.sin(angle)*dist);
        
        this.scene.add(group);
        this.enemies.push({ mesh: group, hp: 100 });
    },

    shoot() {
        if(!this.controls.isLocked || this.state.ammo <= 0 || this.state.isReloading) return;

        this.state.ammo--;
        document.getElementById('ammo-cur').innerText = this.state.ammo;
        
        // Анимация отдачи
        this.weaponModel.position.z += 0.15;
        this.muzzleFlash.intensity = 15;
        setTimeout(() => this.muzzleFlash.intensity = 0, 50);

        // Стрельба
        const ray = new THREE.Raycaster();
        ray.setFromCamera({x:0, y:0}, this.camera);
        const hits = ray.intersectObjects(this.scene.children, true);

        for(let hit of hits) {
            let obj = hit.object;
            while(obj.parent && obj.parent !== this.scene) obj = obj.parent;
            const enemy = this.enemies.find(e => e.mesh === obj);
            if(enemy) {
                enemy.hp -= 40;
                if(enemy.hp <= 0) {
                    this.scene.remove(obj);
                    this.enemies = this.enemies.filter(e => e !== enemy);
                }
                break;
            }
        }

        if(this.state.ammo <= 0) this.reload();
    },

    reload() {
        if(this.state.isReloading) return;
        this.state.isReloading = true;
        const bar = document.getElementById('reload-bar');
        bar.style.width = '100%';
        
        // Анимация перезарядки (Procedural)
        const startPos = this.weaponModel.position.y;
        const startRot = this.weaponModel.rotation.x;
        
        let startTime = Date.now();
        const duration = 1500;

        const animateReload = () => {
            let elapsed = Date.now() - startTime;
            let p = elapsed / duration;

            if(p < 1) {
                this.weaponModel.position.y = startPos - Math.sin(p * Math.PI) * 0.3;
                this.weaponModel.rotation.x = startRot - Math.sin(p * Math.PI) * 0.5;
                bar.style.width = (100 - p * 100) + '%';
                requestAnimationFrame(animateReload);
            } else {
                this.state.ammo = 30;
                this.state.isReloading = false;
                document.getElementById('ammo-cur').innerText = '30';
                bar.style.width = '0%';
                this.weaponModel.position.y = startPos;
                this.weaponModel.rotation.x = startRot;
            }
        };
        animateReload();
    },

    update() {
        if(!this.controls.isLocked) return;
        const delta = this.clock.getDelta();
        const time = performance.now() * 0.001;

        // --- ФИЗИКА И ДВИЖЕНИЕ ---
        const speed = this.keys['ShiftLeft'] ? 0.25 : 0.15;
        if(this.keys['KeyW']) this.controls.moveForward(speed);
        if(this.keys['KeyS']) this.controls.moveForward(-speed);
        if(this.keys['KeyA']) this.controls.moveRight(-speed);
        if(this.keys['KeyD']) this.controls.moveRight(speed);

        // Гравитация
        this.playerPhys.vel.y -= this.settings.gravity;
        this.camera.position.y += this.playerPhys.vel.y;
        if(this.camera.position.y < 1.8) {
            this.camera.position.y = 1.8;
            this.playerPhys.vel.y = 0;
            this.playerPhys.onGround = true;
        }

        // --- АНИМАЦИИ ОРУЖИЯ ---
        // 1. Возврат после отдачи
        this.weaponModel.position.z = THREE.MathUtils.lerp(this.weaponModel.position.z, -0.6, 0.1);
        
        // 2. Sway (Отставание при повороте)
        // Мы берем дельту вращения из контроллера (упрощенно через lerp к нулю)
        this.weaponSway.position.x = THREE.MathUtils.lerp(this.weaponSway.position.x, 0, 0.1);
        this.weaponSway.position.y = THREE.MathUtils.lerp(this.weaponSway.position.y, 0, 0.1);

        // 3. Bobbing (Качание при ходьбе)
        const isMoving = this.keys['KeyW'] || this.keys['KeyS'] || this.keys['KeyA'] || this.keys['KeyD'];
        if(isMoving && this.playerPhys.onGround) {
            const bob = Math.sin(time * 10) * 0.02;
            this.weaponRoot.position.y = bob;
            this.weaponRoot.position.x = Math.cos(time * 5) * 0.01;
        } else {
            this.weaponRoot.position.y = THREE.MathUtils.lerp(this.weaponRoot.position.y, 0, 0.1);
        }

        // --- ИИ И ВРАГИ ---
        this.enemies.forEach(e => {
            const dist = e.mesh.position.distanceTo(this.camera.position);
            const moveDir = this.camera.position.clone().sub(e.mesh.position).normalize();
            e.mesh.position.add(moveDir.multiplyScalar(0.05 + (this.state.wave * 0.005)));
            e.mesh.lookAt(this.camera.position.x, 0.8, this.camera.position.z);
            
            if(dist < 2.5) {
                this.state.hp -= 0.2;
                document.getElementById('hp-fill').style.width = this.state.hp + '%';
            }
        });

        if(this.state.hp <= 0) location.reload();
    },

    start() {
        document.getElementById('boot-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        this.init();
        this.controls.lock();
        this.animate();
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        this.update();
        this.renderer.render(this.scene, this.camera);
    }
};

window.Core = Core;
</script>
</body>
</html>

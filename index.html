<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CyberCat: Neon Follow</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0, 20, 40, 0.8); padding: 15px;
            border: 2px solid #0ff; border-radius: 10px;
            color: #0ff; box-shadow: 0 0 15px #0ff;
            pointer-events: none;
        }
        .stat { font-size: 20px; margin-bottom: 5px; }
        #hint { font-size: 12px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">🐟 Собранная энергия: <span id="fishCount">0</span> / 5</div>
    <div id="quest">Квест: Найдите светящуюся рыбу в городе</div>
    <div id="hint">Управление: WASD | Обзор: Мышь | Зум: Колесико</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// --- ИНИЦИАЛИЗАЦИЯ ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020205);
scene.fog = new THREE.FogExp2(0x020208, 0.008);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 15, 25);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ReinhardToneMapping;
document.body.appendChild(renderer.domElement);

// --- ПОСТ-ОБРАБОТКА (СВЕЧЕНИЕ) ---
const renderScene = new RenderPass(scene, camera);
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
bloomPass.threshold = 0.1;
bloomPass.strength = 1.0;
const composer = new EffectComposer(renderer);
composer.addPass(renderScene);
composer.addPass(bloomPass);

// --- УПРАВЛЕНИЕ КАМЕРОЙ ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1; // Чтобы не смотреть под пол

// --- СВЕТ ---
scene.add(new THREE.AmbientLight(0x4040ff, 0.2));
const cityLight = new THREE.PointLight(0x00ffff, 2, 200);
cityLight.position.set(0, 50, 0);
scene.add(cityLight);

// --- ОКРУЖЕНИЕ ---
// Пол
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(1000, 1000), 
    new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.5 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Город (Здания)
const buildings = [];
const winTex = () => {
    const canvas = document.createElement('canvas');
    canvas.width = 32; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#111'; ctx.fillRect(0,0,32,64);
    ctx.fillStyle = '#0ff'; 
    for(let i=0; i<4; i++) for(let j=0; j<8; j++) if(Math.random()>0.5) ctx.fillRect(i*8+2, j*8+2, 4, 4);
    const t = new THREE.CanvasTexture(canvas); t.wrapS = t.wrapT = THREE.RepeatWrapping; return t;
};

for (let i = 0; i < 120; i++) {
    const h = 20 + Math.random() * 60;
    const w = 8 + Math.random() * 12;
    const bGeo = new THREE.BoxGeometry(w, h, w);
    const bMat = new THREE.MeshStandardMaterial({ color: 0x0a0a15, emissiveMap: winTex(), emissive: 0x00ffff, emissiveIntensity: 0.3 });
    const b = new THREE.Mesh(bGeo, bMat);
    
    const angle = Math.random() * Math.PI * 2;
    const dist = 40 + Math.random() * 250;
    b.position.set(Math.cos(angle)*dist, h/2, Math.sin(angle)*dist);
    
    scene.add(b);
    b.userData.box = new THREE.Box3().setFromObject(b);
    buildings.push(b);
}

// --- КИБЕР-КОТ ---
const catGroup = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 3.5), new THREE.MeshStandardMaterial({ color: 0xff8822 }));
catGroup.add(body);
// Глаза
const eyeGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 5 });
const e1 = new THREE.Mesh(eyeGeo, eyeMat); e1.position.set(0.5, 0.4, -1.8); catGroup.add(e1);
const e2 = new THREE.Mesh(eyeGeo, eyeMat); e2.position.set(-0.5, 0.4, -1.8); catGroup.add(e2);

catGroup.position.y = 0.6;
scene.add(catGroup);

// --- РЫБА ---
const fishItems = [];
const fGeo = new THREE.IcosahedronGeometry(0.8, 0);
const fMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 3 });

function spawnFish() {
    const f = new THREE.Mesh(fGeo, fMat);
    f.position.set((Math.random()-0.5)*150, 1, (Math.random()-0.5)*150);
    scene.add(f);
    fishItems.push(f);
}
for(let i=0; i<15; i++) spawnFish();

// --- ЛОГИКА ---
let score = 0;
const keys = {};
window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

function checkCollision(nx, nz) {
    const catBox = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(nx, 0.6, nz), new THREE.Vector3(2.2, 1.2, 3.7));
    return buildings.some(b => catBox.intersectsBox(b.userData.box));
}

function animate() {
    requestAnimationFrame(animate);
    
    // Движение относительно камеры
    const camDir = new THREE.Vector3();
    camera.getWorldDirection(camDir);
    camDir.y = 0; camDir.normalize();
    const camSide = new THREE.Vector3().crossVectors(camDir, new THREE.Vector3(0, 1, 0)).normalize();

    let move = new THREE.Vector3(0,0,0);
    if (keys['w']) move.add(camDir);
    if (keys['s']) move.sub(camDir);
    if (keys['a']) move.add(camSide);
    if (keys['d']) move.sub(camSide);

    if (move.length() > 0) {
        move.normalize();
        const nextX = catGroup.position.x + move.x * 0.5;
        const nextZ = catGroup.position.z + move.z * 0.5;
        
        if (!checkCollision(nextX, nextZ)) {
            catGroup.position.set(nextX, 0.6, nextZ);
            const targetRot = Math.atan2(move.x, move.z) + Math.PI;
            catGroup.rotation.y = THREE.MathUtils.lerp(catGroup.rotation.y, targetRot, 0.15);
        }
    }

    // Сбор рыбы
    fishItems.forEach((f, i) => {
        f.rotation.y += 0.05;
        if(catGroup.position.distanceTo(f.position) < 3) {
            score++;
            document.getElementById('fishCount').innerText = score;
            f.position.set((Math.random()-0.5)*200, 1, (Math.random()-0.5)*200);
            if(score >= 5) document.getElementById('quest').innerText = "✅ Квест выполнен! Ты лучший кибер-кот.";
        }
    });

    // Камера следует за котом
    controls.target.lerp(catGroup.position, 0.1);
    controls.update();

    composer.render();
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CyberCat City</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}

#inventory{
position:absolute;
top:60px;
left:10px;
color:white;
font-size:16px;
}

#quest{
position:absolute;
top:120px;
left:10px;
color:#00ffff;
}

</style>
</head>

<body>

<div id="ui">🐟 Рыба: <span id="fish">0</span></div>

<div id="inventory">
🎒 Инвентарь
<div id="items"></div>
</div>

<div id="quest">
📜 Квест: собрать 5 рыб
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let light = new THREE.PointLight(0x00ffff,2,200)
light.position.set(0,50,0)
scene.add(light)

let ambient = new THREE.AmbientLight(0xffffff,0.5)
scene.add(ambient)

let groundGeo = new THREE.PlaneGeometry(2000,2000)

let groundMat = new THREE.MeshStandardMaterial({
color:0x080820
})

let ground = new THREE.Mesh(groundGeo,groundMat)
ground.rotation.x=-Math.PI/2
scene.add(ground)

let catGeo = new THREE.BoxGeometry(2,1,4)

let catMat = new THREE.MeshStandardMaterial({
color:0xff9933
})

let cat = new THREE.Mesh(catGeo,catMat)
cat.position.y=1
scene.add(cat)

let buildings=[]

for(let i=0;i<200;i++){

let geo=new THREE.BoxGeometry(
5+Math.random()*20,
20+Math.random()*100,
5+Math.random()*20
)

let mat=new THREE.MeshStandardMaterial({
color:0x111133,
emissive:0x001122
})

let b=new THREE.Mesh(geo,mat)

b.position.x=Math.random()*1000-500
b.position.z=Math.random()*1000-500
b.position.y=geo.parameters.height/2

scene.add(b)

buildings.push(b)

}

let keys={}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})

let inventory={
fish:0
}

let quest={
target:5,
done:false
}

function updateUI(){

document.getElementById("fish").innerText=inventory.fish

let items=document.getElementById("items")
items.innerHTML="🐟 Рыба x"+inventory.fish

if(inventory.fish>=quest.target && !quest.done){

quest.done=true
document.getElementById("quest").innerText="✅ Квест выполнен!"

}

}

let fishItems=[]

function spawnFish(){

let geo=new THREE.SphereGeometry(1,16,16)

let mat=new THREE.MeshStandardMaterial({
color:0x00ffff,
emissive:0x00ffff
})

let f=new THREE.Mesh(geo,mat)

f.position.x=Math.random()*200-100
f.position.z=Math.random()*200-100
f.position.y=1

scene.add(f)

fishItems.push(f)

}

for(let i=0;i<15;i++) spawnFish()

let robots=[]

function spawnRobot(){

let geo=new THREE.BoxGeometry(2,4,2)

let mat=new THREE.MeshStandardMaterial({
color:0x8888ff
})

let r=new THREE.Mesh(geo,mat)

r.position.x=Math.random()*300-150
r.position.z=Math.random()*300-150
r.position.y=2

scene.add(r)

robots.push(r)

}

for(let i=0;i<8;i++) spawnRobot()

function updateCat(){

let speed=0.25

if(keys["w"]) cat.position.z-=speed
if(keys["s"]) cat.position.z+=speed
if(keys["a"]) cat.position.x-=speed
if(keys["d"]) cat.position.x+=speed

}

function updateCamera(){

camera.position.x=cat.position.x
camera.position.y=cat.position.y+8
camera.position.z=cat.position.z+12

camera.lookAt(cat.position)

}

function updateFish(){

fishItems.forEach(f=>{

let dx=f.position.x-cat.position.x
let dz=f.position.z-cat.position.z

let dist=Math.sqrt(dx*dx+dz*dz)

if(dist<3){

inventory.fish++

updateUI()

f.position.x=Math.random()*200-100
f.position.z=Math.random()*200-100

}

})

}

function updateRobots(){

robots.forEach(r=>{

r.rotation.y+=0.02

let dx=cat.position.x-r.position.x
let dz=cat.position.z-r.position.z

let dist=Math.sqrt(dx*dx+dz*dz)

if(dist<15){

r.position.x+=dx*0.01
r.position.z+=dz*0.01

}

})

}

function saveGame(){

localStorage.setItem("cybercat_save",
JSON.stringify({
fish:inventory.fish,
x:cat.position.x,
z:cat.position.z
})
)

}

function loadGame(){

let data=localStorage.getItem("cybercat_save")

if(!data) return

let save=JSON.parse(data)

inventory.fish=save.fish
cat.position.x=save.x
cat.position.z=save.z

updateUI()

}

setInterval(saveGame,5000)

loadGame()

function animate(){

requestAnimationFrame(animate)

updateCat()
updateCamera()
updateFish()
updateRobots()

renderer.render(scene,camera)

}

updateUI()

animate()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STEVE_PROTOCOL: REVELATION (v.8.0)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;700&family=Orbitron:wght@900&display=swap');
        
        :root { --neon: #00ffff; --bg: #000a0f; --danger: #ff0055; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Fira Code', monospace; overflow: hidden; }

        /* ИНТЕРФЕЙС */
        #ui-container { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: var(--neon); box-shadow: 0 0 8px var(--neon); }
        .ch-h { top: 14px; width: 30px; height: 2px; } .ch-v { left: 14px; width: 2px; height: 30px; }

        /* ПАНЕЛИ СТАТУСА */
        .panel { position: absolute; background: rgba(0, 20, 30, 0.85); border: 2px solid var(--neon); padding: 15px; backdrop-filter: blur(5px); }
        #stats-left { top: 20px; left: 20px; width: 220px; }
        #stats-right { top: 20px; right: 20px; text-align: right; }
        #ammo-display { bottom: 20px; right: 20px; font-size: 32px; font-weight: 900; }
        
        .bar { width: 100%; height: 8px; background: #002; border: 1px solid var(--neon); margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: var(--danger); transition: 0.2s; }

        /* МЕНЮ НАСТРОЕК */
        #settings-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto; z-index: 1000;
        }
        .settings-box { width: 600px; padding: 40px; border: 4px double var(--neon); background: #001; }
        .row { display: flex; justify-content: space-between; margin: 20px 0; align-items: center; }
        input[type=range] { width: 250px; accent-color: var(--neon); cursor: pointer; }
        .btn { padding: 12px 25px; border: 2px solid var(--neon); background: none; color: var(--neon); cursor: pointer; font-family: inherit; font-weight: bold; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        #damage-flash { position: absolute; inset: 0; pointer-events: none; transition: 0.1s; }
        #logs { position: absolute; bottom: 20px; left: 20px; font-size: 10px; color: rgba(0,255,255,0.5); }
    </style>
</head>
<body>

<div id="damage-flash"></div>

<div id="ui-container">
    <div id="crosshair"><div class="ch-h"></div><div class="ch-v"></div></div>
    
    <div id="stats-left" class="panel">
        <div style="font-size: 12px;">STEVE_INTEGRITY</div>
        <div class="bar"><div id="hp-fill"></div></div>
        <div id="pos-info" style="margin-top: 10px; font-size: 10px;">X: 0 Y: 0 Z: 0</div>
    </div>

    <div id="stats-right" class="panel">
        <div id="timer">SESSION: 00:00</div>
        <div id="kills" style="color: var(--danger);">KILLS: 0</div>
    </div>

    <div id="ammo-display" class="panel">
        <span id="ammo-count">30</span><span style="font-size: 14px; color: rgba(255,255,255,0.5);">/&infin;</span>
    </div>

    <div id="logs"></div>
</div>

<div id="settings-overlay">
    <div class="settings-box">
        <h1 style="text-align: center; font-family: 'Orbitron';">ENGINE_SETTINGS</h1>
        <div class="row"><span>FOV (Field of View)</span><input type="range" id="fov" min="60" max="120" value="85"></div>
        <div class="row"><span>Sensitivity</span><input type="range" id="sens" min="1" max="20" value="10"></div>
        <div class="row"><span>Render Distance</span><input type="range" id="render" min="50" max="1000" value="400"></div>
        <div class="row"><span>Bloom FX</span><button class="btn" onclick="Game.toggleBloom()">ENABLED</button></div>
        <div class="row"><span>Invert Y-Axis</span><button class="btn" onclick="Game.toggleInvert()">DISABLED</button></div>
        <center style="margin-top: 40px;"><button class="btn" style="font-size: 20px;" onclick="Game.toggleMenu()">SAVE & RETURN</button></center>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

/** * ==========================================================
 * CYBER_ENGINE v.8.0 - ПРОФЕССИОНАЛЬНАЯ СБОРКА
 * ==========================================================
 */

const Game = {
    // 1. Инициализация систем
    state: {
        hp: 100,
        kills: 0,
        ammo: 30,
        isSprinting: false,
        onGround: true,
        canJump: true,
        currentWeapon: 'gun', // 'sword' | 'gun'
        isFiring: false
    },

    settings: {
        fov: 85,
        sens: 0.002,
        renderDist: 400,
        invertY: false,
        bloom: true
    },

    physics: {
        gravity: 0.007,
        jumpForce: 0.16,
        velocity: new THREE.Vector3(),
        friction: 0.9
    },

    init() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000205);
        this.scene.fog = new THREE.FogExp2(0x000205, 0.03);

        this.camera = new THREE.PerspectiveCamera(this.settings.fov, window.innerWidth / window.innerHeight, 0.1, 2000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(this.renderer.domElement);

        this.controls = new PointerLockControls(this.camera, document.body);
        this.clock = new THREE.Clock();
        this.raycaster = new THREE.Raycaster();

        this.setupLights();
        this.createEnvironment();
        this.createPlayerModel();
        this.spawnEnemies(20);
        this.setupEventListeners();
        
        this.log("CORE ENGINE LOADED. WELCOME, STEVE.");
        this.animate();
    },

    setupLights() {
        const amb = new THREE.AmbientLight(0x4040ff, 0.3);
        this.scene.add(amb);

        this.flashLight = new THREE.PointLight(0x00ffff, 3, 25);
        this.camera.add(this.flashLight);
        this.scene.add(this.camera);
    },

    createEnvironment() {
        // Бесконечная сетка
        const grid = new THREE.GridHelper(3000, 150, 0x00ffff, 0x001122);
        this.scene.add(grid);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(3000, 3000),
            new THREE.MeshStandardMaterial({ color: 0x030303, roughness: 0.05 })
        );
        floor.rotation.x = -Math.PI/2;
        this.scene.add(floor);

        // Город будущего
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        for(let i=0; i<150; i++) {
            const h = 20 + Math.random() * 120;
            const w = 10 + Math.random() * 15;
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x000000, 
                emissive: 0x00ffff, 
                emissiveIntensity: Math.random() * 0.2 
            });
            const b = new THREE.Mesh(boxGeo, mat);
            b.scale.set(w, h, w);
            b.position.set((Math.random()-0.5)*1200, h/2, (Math.random()-0.5)*1200);
            this.scene.add(b);
        }
    },

    createPlayerModel() {
        this.weaponRoot = new THREE.Group();
        this.camera.add(this.weaponRoot);

        // --- МОДЕЛЬ ВИНТОВКИ ---
        this.gun = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.25, 1.2), new THREE.MeshStandardMaterial({color: 0x111111}));
        const muzzle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.2), new THREE.MeshStandardMaterial({color: 0x00ffff, emissive: 0x00ffff}));
        muzzle.rotation.x = Math.PI/2;
        muzzle.position.z = -0.6;
        this.gun.add(body, muzzle);
        this.gun.position.set(0.4, -0.3, -0.6);
        this.weaponRoot.add(this.gun);

        // Эффект выстрела
        this.muzzleFlash = new THREE.PointLight(0x00ffff, 0, 10);
        this.muzzleFlash.position.set(0.4, -0.3, -1.2);
        this.camera.add(this.muzzleFlash);
    },

    spawnEnemies(count) {
        this.enemies = [];
        for(let i=0; i<count; i++) {
            const alex = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.6, 0.4), new THREE.MeshStandardMaterial({color: 0xff00ff}));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1.05;
            alex.add(body, head);
            
            alex.position.set((Math.random()-0.5)*500, 0.8, (Math.random()-0.5)*500);
            this.scene.add(alex);
            this.enemies.push({ 
                mesh: alex, 
                hp: 100, 
                vel: new THREE.Vector3(),
                nextMove: 0 
            });
        }
    },

    setupEventListeners() {
        this.keys = {};
        window.addEventListener('keydown', e => {
            this.keys[e.code] = true;
            if(e.code === 'Space' && this.state.canJump) this.jump();
            if(e.code === 'Escape') this.toggleMenu();
        });
        window.addEventListener('keyup', e => this.keys[e.code] = false);
        window.addEventListener('mousedown', () => this.fire());
        
        // Settings UI
        document.getElementById('fov').oninput = (e) => {
            this.camera.fov = e.target.value;
            this.camera.updateProjectionMatrix();
        };
        
        document.getElementById('sens').oninput = (e) => {
            this.settings.sens = e.target.value * 0.0002;
        };
    },

    jump() {
        this.physics.velocity.y = this.physics.jumpForce;
        this.state.canJump = false;
        this.state.onGround = false;
        this.log("JUMP_PROTOCOL_ACTIVATED");
    },

    fire() {
        if(!this.controls.isLocked || this.state.ammo <= 0) return;

        this.state.ammo--;
        document.getElementById('ammo-count').innerText = this.state.ammo;
        
        // Эффекты
        this.muzzleFlash.intensity = 10;
        this.weaponRoot.position.z += 0.15; // Отдача
        this.camera.rotation.x += 0.02; // Тряска

        // Raycast
        this.raycaster.setFromCamera({x:0, y:0}, this.camera);
        const hits = this.raycaster.intersectObjects(this.scene.children, true);
        
        for(let hit of hits) {
            let root = hit.object;
            while(root.parent && root.parent !== this.scene) root = root.parent;
            
            const enemy = this.enemies.find(e => e.mesh === root);
            if(enemy) {
                this.damageEnemy(enemy, hit.point);
                break;
            }
        }

        setTimeout(() => this.muzzleFlash.intensity = 0, 50);
    },

    damageEnemy(enemy, point) {
        enemy.hp -= 25;
        this.createImpact(point);
        if(enemy.hp <= 0) {
            this.scene.remove(enemy.mesh);
            this.enemies = this.enemies.filter(e => e !== enemy);
            this.state.kills++;
            document.getElementById('kills').innerText = `KILLS: ${this.state.kills}`;
            setTimeout(() => this.spawnEnemies(1), 2000);
        }
    },

    createImpact(pos) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0x00ffff}));
        p.position.copy(pos);
        this.scene.add(p);
        setTimeout(() => this.scene.remove(p), 200);
    },

    toggleMenu() {
        const menu = document.getElementById('settings-overlay');
        if(menu.style.display === 'flex') {
            menu.style.display = 'none';
            this.controls.lock();
        } else {
            menu.style.display = 'flex';
            this.controls.unlock();
        }
    },

    log(msg) {
        const l = document.getElementById('logs');
        l.innerHTML = `> ${msg}<br>` + l.innerHTML;
    },

    update(delta) {
        if(!this.controls.isLocked) return;

        // 1. Движение
        const speed = this.keys['ShiftLeft'] ? 0.35 : 0.18;
        const dir = new THREE.Vector3();
        if(this.keys['KeyW']) dir.z -= 1;
        if(this.keys['KeyS']) dir.z += 1;
        if(this.keys['KeyA']) dir.x -= 1;
        if(this.keys['KeyD']) dir.x += 1;
        
        dir.normalize().multiplyScalar(speed);
        this.controls.moveRight(dir.x);
        this.controls.moveForward(-dir.z);

        // 2. Гравитация (Исправление проваливания)
        this.physics.velocity.y -= this.physics.gravity;
        this.camera.position.y += this.physics.velocity.y;

        if(this.camera.position.y < 1.8) {
            this.camera.position.y = 1.8;
            this.physics.velocity.y = 0;
            this.state.canJump = true;
            this.state.onGround = true;
        }

        // 3. Анимация оружия (Sway)
        this.weaponRoot.position.z = THREE.MathUtils.lerp(this.weaponRoot.position.z, 0, 0.1);
        const time = Date.now() * 0.005;
        const bob = Math.sin(time * 2) * 0.02;
        this.weaponRoot.position.y = bob;
        this.camera.rotation.z = THREE.MathUtils.lerp(this.camera.rotation.z, 0, 0.1);

        // 4. ИИ Врагов
        this.enemies.forEach(e => {
            const dist = e.mesh.position.distanceTo(this.camera.position);
            if(dist < 50) {
                e.mesh.lookAt(this.camera.position.x, 0.8, this.camera.position.z);
                const moveDir = this.camera.position.clone().sub(e.mesh.position).normalize();
                e.mesh.position.add(moveDir.multiplyScalar(0.06));
                
                if(dist < 2.5) this.takeDamage(0.5);
            }
        });

        document.getElementById('pos-info').innerText = 
            `X: ${Math.round(this.camera.position.x)} Y: ${Math.round(this.camera.position.y)} Z: ${Math.round(this.camera.position.z)}`;
    },

    takeDamage(amt) {
        this.state.hp -= amt;
        document.getElementById('hp-fill').style.width = this.state.hp + "%";
        document.getElementById('damage-flash').style.background = 'rgba(255,0,0,0.1)';
        setTimeout(() => document.getElementById('damage-flash').style.background = 'transparent', 50);
        if(this.state.hp <= 0) location.reload();
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const delta = this.clock.getDelta();
        this.update(delta);
        this.renderer.render(this.scene, this.camera);
    }
};

window.Game = Game;
window.onload = () => {
    const startBtn = document.createElement('button');
    startBtn.innerText = "INITIALIZE_SYSTEM";
    startBtn.className = "btn";
    startBtn.style = "position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5000; font-size:30px;";
    document.body.appendChild(startBtn);
    
    startBtn.onclick = () => {
        startBtn.remove();
        Game.init();
        Game.controls.lock();
    };
};
</script>
</body>
</html>

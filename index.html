<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CyberCat City - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 20px; z-index: 10; text-shadow: 2px 2px #000; }
        #inventory { position: absolute; top: 50px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #quest { position: absolute; top: 100px; left: 10px; color: #00ffff; font-weight: bold; }
        #instructions { position: absolute; bottom: 10px; left: 10px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui">🐟 Рыба: <span id="fish">0</span></div>
<div id="inventory">🎒 Инвентарь: <span id="items">пусто</span></div>
<div id="quest">📜 Квест: собрать 5 рыб</div>
<div id="instructions">Управление: WASD | Камера: Мышь</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    // 1. Сцена и Рендерер
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);
    scene.fog = new THREE.FogExp2(0x020205, 0.01); // Добавим туман для атмосферы

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. Камера
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 20);

    // 3. Контроллеры (OrbitControls теперь должны работать)
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 4. Свет
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const mainLight = new THREE.PointLight(0x00ffff, 2, 300);
    mainLight.position.set(0, 50, 0);
    scene.add(mainLight);

    // 5. Окружение (Пол)
    const groundGeo = new THREE.PlaneGeometry(1000, 1000);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // 6. Персонаж (Кот - оранжевый куб)
    const catGeo = new THREE.BoxGeometry(2, 1, 3);
    const catMat = new THREE.MeshStandardMaterial({ color: 0xff9933 });
    const cat = new THREE.Mesh(catGeo, catMat);
    cat.position.y = 0.5;
    scene.add(cat);

    // 7. Здания
    const buildings = [];
    for (let i = 0; i < 100; i++) {
        const h = 10 + Math.random() * 50;
        const geo = new THREE.BoxGeometry(5 + Math.random() * 10, h, 5 + Math.random() * 10);
        const mat = new THREE.MeshStandardMaterial({ color: 0x112244, emissive: 0x000511 });
        const b = new THREE.Mesh(geo, mat);
        
        b.position.x = (Math.random() - 0.5) * 400;
        b.position.z = (Math.random() - 0.5) * 400;
        b.position.y = h / 2;
        
        scene.add(b);
        b.userData.box = new THREE.Box3().setFromObject(b);
        buildings.push(b);
    }

    // 8. Логика игры
    let inventory = { fish: 0 };
    let keys = {};
    const fishItems = [];

    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

    function spawnFish() {
        const geo = new THREE.IcosahedronGeometry(0.8, 0);
        const mat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff });
        const f = new THREE.Mesh(geo, mat);
        f.position.set((Math.random() - 0.5) * 100, 1, (Math.random() - 0.5) * 100);
        scene.add(f);
        fishItems.push(f);
    }

    for (let i = 0; i < 20; i++) spawnFish();

    function updateUI() {
        document.getElementById("fish").innerText = inventory.fish;
        document.getElementById("items").innerText = "Рыба x" + inventory.fish;
        if (inventory.fish >= 5) {
            document.getElementById("quest").innerHTML = "✅ Квест выполнен! Ты сытый кибер-кот.";
            document.getElementById("quest").style.color = "#0f0";
        }
    }

    function checkCollision(nx, nz) {
        const playerBox = new THREE.Box3().setFromCenterAndSize(
            new THREE.Vector3(nx, 0.5, nz),
            new THREE.Vector3(2, 1, 3)
        );
        for (let b of buildings) {
            if (playerBox.intersectsBox(b.userData.box)) return true;
        }
        return false;
    }

    // 9. Анимация
    const speed = 0.4;
    function animate() {
        requestAnimationFrame(animate);

        let nextX = cat.position.x;
        let nextZ = cat.position.z;

        if (keys["w"]) nextZ -= speed;
        if (keys["s"]) nextZ += speed;
        if (keys["a"]) nextX -= speed;
        if (keys["d"]) nextX += speed;

        if (!checkCollision(nextX, nextZ)) {
            cat.position.x = nextX;
            cat.position.z = nextZ;
        }

        // Сбор рыбы
        fishItems.forEach((f, index) => {
            f.rotation.y += 0.05;
            if (cat.position.distanceTo(f.position) < 2.5) {
                inventory.fish++;
                updateUI();
                // Перемещаем рыбу в новое место
                f.position.set((Math.random() - 0.5) * 150, 1, (Math.random() - 0.5) * 150);
            }
        });

        // Камера следует за котом
        controls.target.lerp(cat.position, 0.1);
        controls.update();

        renderer.render(scene, camera);
    }

    // Ресайз окна
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NEON_STRIKE_ULTRA_FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body { margin: 0; background: #000; color: #0ff; font-family: 'Fira Code', monospace; overflow: hidden; user-select: none; }
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: none; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid #0ff; transform: translate(-50%, -50%); border-radius: 50%; opacity: 0.7; }
        .ui-bottom { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box; }
        .stat-card { background: rgba(0,10,20,0.9); border-left: 4px solid #0ff; padding: 20px; min-width: 240px; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0,255,255,0.1); }
        #hp-bar { width: 100%; height: 8px; background: rgba(255,0,255,0.2); margin-top: 10px; }
        #hp-fill { width: 100%; height: 100%; background: #f0f; box-shadow: 0 0 15px #f0f; transition: 0.2s; }
        #reload-bar { height: 4px; background: #0ff; width: 0%; margin-top: 10px; box-shadow: 0 0 10px #0ff; }
        #boot-screen { position: absolute; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn { padding: 20px 60px; background: none; border: 2px solid #0ff; color: #0ff; cursor: pointer; font-size: 20px; font-family: inherit; transition: 0.4s; letter-spacing: 4px; }
        .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 30px #0ff; }
    </style>
</head>
<body>

<div id="boot-screen">
    <h1 style="font-size: 50px; margin: 0; letter-spacing: 10px; color: #f0f;">NEON_STRIKE</h1>
    <p style="margin-bottom: 40px; opacity: 0.5;">v11.0.9 // STABILIZED_CORE</p>
    <button class="btn" onclick="Core.start()">CONNECT</button>
</div>

<div id="hud">
    <div class="crosshair"></div>
    <div id="wave-info" style="position:absolute; top:40px; left:50%; transform:translateX(-50%); text-align:center;">
        <div style="font-size: 32px; font-weight: bold; text-shadow: 0 0 10px #0ff;">WAVE: <span id="wave-num">1</span></div>
        <div style="font-size: 14px; color: #f0f; letter-spacing: 2px;">STATUS: ACTIVE_THREAT</div>
    </div>
    <div class="ui-bottom">
        <div class="stat-card">
            <div style="font-size: 12px; opacity: 0.6;">USER_INTEGRITY</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
        </div>
        <div class="stat-card" style="text-align: right; border-left: none; border-right: 4px solid #0ff;">
            <div style="font-size: 12px; opacity: 0.6;">CYBER_RIFLE_v4</div>
            <div style="font-size: 36px; font-weight: bold;"><span id="ammo-cur">30</span><span style="font-size: 18px; opacity: 0.3;"> / 30</span></div>
            <div id="reload-bar"></div>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

const Core = {
    settings: {
        moveSpeed: 0.18,
        eyeHeight: 1.8,
        lookSense: 0.002
    },

    state: {
        hp: 100,
        ammo: 30,
        isReloading: false,
        wave: 1,
        spawnRate: 3000
    },

    init() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000205);
        this.scene.fog = new THREE.FogExp2(0x000205, 0.02);

        this.camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.camera.position.y = this.settings.eyeHeight;

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(this.renderer.domElement);

        this.controls = new PointerLockControls(this.camera, document.body);
        this.clock = new THREE.Clock();
        this.keys = {};

        this.setupLights();
        this.setupPlayer();
        this.setupEnvironment();
        this.bindEvents();
        
        this.enemies = [];
    },

    setupLights() {
        this.scene.add(new THREE.AmbientLight(0x404040, 0.6));
        this.muzzleFlash = new THREE.PointLight(0x00ffff, 0, 15);
        this.camera.add(this.muzzleFlash);
        this.scene.add(this.camera);
    },

    setupPlayer() {
        this.weaponRoot = new THREE.Group();
        this.weaponSway = new THREE.Group();
        
        // --- ДЕТАЛИЗИРОВАННАЯ МОДЕЛЬ ---
        const g = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.22, 0.6), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        const core = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.5), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 }));
        core.rotation.x = Math.PI/2;
        const rail = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.08, 0.8), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        rail.position.y = 0.1;
        
        g.add(body, core, rail);
        this.weaponModel = g;
        this.weaponModel.position.set(0.35, -0.4, -0.5);
        
        this.weaponSway.add(this.weaponModel);
        this.weaponRoot.add(this.weaponSway);
        this.camera.add(this.weaponRoot);
    },

    setupEnvironment() {
        this.scene.add(new THREE.GridHelper(2000, 80, 0x00ffff, 0x001111));
        
        const box = new THREE.BoxGeometry(1, 1, 1);
        for(let i=0; i<60; i++) {
            const h = 20 + Math.random()*100;
            const b = new THREE.Mesh(box, new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x00ffff, emissiveIntensity: 0.1 }));
            b.scale.set(10, h, 10);
            b.position.set((Math.random()-0.5)*800, h/2, (Math.random()-0.5)*800);
            this.scene.add(b);
        }
    },

    bindEvents() {
        window.onkeydown = (e) => this.keys[e.code] = true;
        window.onkeyup = (e) => this.keys[e.code] = false;
        window.onmousedown = () => this.shoot();
        
        setInterval(() => {
            this.state.wave++;
            this.state.spawnRate = Math.max(800, this.state.spawnRate - 300);
            document.getElementById('wave-num').innerText = this.state.wave;
        }, 30000);

        const spawnLoop = () => {
            if(this.controls.isLocked) this.spawnNPC();
            setTimeout(spawnLoop, this.state.spawnRate);
        };
        spawnLoop();
    },

    spawnNPC() {
        const drone = new THREE.Group();
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.6, 0), new THREE.MeshStandardMaterial({ color: 0xff00ff, wireframe: true }));
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 }));
        eye.position.z = -0.3;
        drone.add(core, eye);
        
        const ang = Math.random() * Math.PI * 2;
        drone.position.set(Math.cos(ang)*60, 1.8, Math.sin(ang)*60);
        this.scene.add(drone);
        this.enemies.push({ mesh: drone, hp: 100, phase: Math.random()*10 });
    },

    shoot() {
        if(!this.controls.isLocked || this.state.ammo <= 0 || this.state.isReloading) return;
        this.state.ammo--;
        document.getElementById('ammo-cur').innerText = this.state.ammo;
        
        this.weaponModel.position.z += 0.2; // Отдача
        this.weaponModel.rotation.x -= 0.1;
        this.muzzleFlash.intensity = 20;
        setTimeout(() => this.muzzleFlash.intensity = 0, 40);

        const ray = new THREE.Raycaster();
        ray.setFromCamera({x:0, y:0}, this.camera);
        const hits = ray.intersectObjects(this.enemies.map(e => e.mesh), true);

        if(hits.length > 0) {
            let obj = hits[0].object;
            while(obj.parent && !this.enemies.find(e => e.mesh === obj)) obj = obj.parent;
            const enemy = this.enemies.find(e => e.mesh === obj);
            if(enemy) {
                enemy.hp -= 40;
                if(enemy.hp <= 0) {
                    this.scene.remove(enemy.mesh);
                    this.enemies = this.enemies.filter(e => e !== enemy);
                }
            }
        }
        if(this.state.ammo <= 0) this.reload();
    },

    reload() {
        if(this.state.isReloading) return;
        this.state.isReloading = true;
        const start = Date.now();
        const dur = 1200;
        const anim = () => {
            let p = (Date.now() - start) / dur;
            if(p < 1) {
                this.weaponModel.rotation.z = p * Math.PI * 2;
                this.weaponModel.position.y = -0.4 - Math.sin(p * Math.PI) * 0.2;
                document.getElementById('reload-bar').style.width = (100 - p * 100) + '%';
                requestAnimationFrame(anim);
            } else {
                this.state.ammo = 30;
                this.state.isReloading = false;
                this.weaponModel.rotation.z = 0;
                this.weaponModel.position.y = -0.4;
                document.getElementById('ammo-cur').innerText = '30';
                document.getElementById('reload-bar').style.width = '0%';
            }
        };
        anim();
    },

    update() {
        if(!this.controls.isLocked) return;
        const time = performance.now() * 0.001;

        // --- ФИЗИКА (БЕЗ ПРОВАЛИВАНИЯ) ---
        const speed = this.keys['ShiftLeft'] ? 0.28 : 0.16;
        const mx = (this.keys['KeyD'] ? 1 : 0) - (this.keys['KeyA'] ? 1 : 0);
        const mz = (this.keys['KeyW'] ? 1 : 0) - (this.keys['KeyS'] ? 1 : 0);
        
        if(mz !== 0) this.controls.moveForward(mz * speed);
        if(mx !== 0) this.controls.moveRight(mx * speed);
        
        // ЖЕСТКАЯ ФИКСАЦИЯ ВЫСОТЫ
        this.camera.position.y = this.settings.eyeHeight;

        // --- ПРОЦЕДУРНАЯ АНИМАЦИЯ ---
        this.weaponModel.position.z = THREE.MathUtils.lerp(this.weaponModel.position.z, -0.5, 0.1);
        this.weaponModel.rotation.x = THREE.MathUtils.lerp(this.weaponModel.rotation.x, 0, 0.1);

        if(mx !== 0 || mz !== 0) {
            const b = this.keys['ShiftLeft'] ? 12 : 8;
            this.weaponRoot.position.y = Math.sin(time * b) * 0.015;
            this.weaponRoot.position.x = Math.cos(time * b / 2) * 0.01;
            this.weaponRoot.rotation.z = THREE.MathUtils.lerp(this.weaponRoot.rotation.z, -mx * 0.06, 0.1);
        } else {
            this.weaponRoot.position.y = THREE.MathUtils.lerp(this.weaponRoot.position.y, Math.sin(time * 2) * 0.005, 0.05);
            this.weaponRoot.rotation.z = THREE.MathUtils.lerp(this.weaponRoot.rotation.z, 0, 0.1);
        }

        // --- ВРАГИ ---
        this.enemies.forEach(e => {
            e.mesh.position.y = 1.8 + Math.sin(time * 3 + e.phase) * 0.3;
            const dir = new THREE.Vector3().subVectors(this.camera.position, e.mesh.position).normalize();
            e.mesh.position.add(dir.multiplyScalar(0.08 + (this.state.wave * 0.01)));
            e.mesh.lookAt(this.camera.position);

            if(e.mesh.position.distanceTo(this.camera.position) < 2.5) {
                this.state.hp -= 0.4;
                document.getElementById('hp-fill').style.width = this.state.hp + '%';
            }
        });

        if(this.state.hp <= 0) location.reload();
    },

    start() {
        document.getElementById('boot-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        this.init();
        this.controls.lock();
        this.animate();
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        this.update();
        this.renderer.render(this.scene, this.camera);
    }
};
window.Core = Core;
</script>
</body>
</html>

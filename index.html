<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEVE_PROTOCOL_RECKONING_OS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@900&display=swap');
        
        :root {
            --neon-blue: #00ffff;
            --neon-pink: #ff00ff;
            --cyber-bg: #00080a;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--cyber-bg);
            font-family: 'Fira Code', monospace;
        }

        /* ТЕРМИНАЛ ЗАГРУЗКИ */
        #boot-loader {
            position: absolute; width: 100%; height: 100%; background: #000;
            z-index: 1000; display: flex; flex-direction: column; padding: 40px;
            color: var(--neon-blue); box-sizing: border-box;
        }

        .log-line { margin-bottom: 5px; opacity: 0; animation: fadeIn 0.1s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* ИНТЕРФЕЙС ИГРЫ */
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; display: none;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 40px; height: 40px; transform: translate(-50%, -50%);
        }
        .ch-line { position: absolute; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .ch-h { top: 19px; width: 40px; height: 2px; }
        .ch-v { left: 19px; width: 2px; height: 40px; }

        .status-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 20, 25, 0.8); border: 1px solid var(--neon-blue);
            padding: 15px; color: var(--neon-blue); width: 300px;
        }

        .health-bar {
            width: 100%; height: 10px; border: 1px solid var(--neon-blue);
            margin-top: 10px; position: relative;
        }
        #hp-fill { width: 100%; height: 100%; background: var(--neon-pink); transition: 0.3s; }

        .inventory {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px;
        }
        .inv-slot {
            width: 60px; height: 60px; background: rgba(0, 40, 50, 0.5);
            border: 2px solid #045; display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white; transition: 0.2s;
        }
        .inv-slot.active { border-color: var(--neon-blue); background: rgba(0, 255, 255, 0.2); transform: scale(1.1); }

        #damage-overlay {
            position: absolute; width: 100%; height: 100%;
            box-shadow: inset 0 0 0 rgba(255,0,0,0); transition: 0.1s;
        }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="boot-loader"></div>

<div id="ui-layer">
    <div id="damage-overlay"></div>
    <div id="crosshair">
        <div class="ch-line ch-h"></div>
        <div class="ch-line ch-v"></div>
    </div>
    
    <div class="status-panel">
        <div>CORE_INTEGRITY: <span id="hp-val">100</span>%</div>
        <div class="health-bar"><div id="hp-fill"></div></div>
        <div style="margin-top: 10px; font-size: 12px; color: var(--neon-pink);">DECRYPTING_WORLD_DATA...</div>
    </div>

    <div class="inventory">
        <div class="inv-slot active" id="slot-0">⚔</div>
        <div class="inv-slot" id="slot-1">⚒</div>
        <div class="inv-slot" id="slot-2">🏹</div>
        <div class="inv-slot" id="slot-3">📦</div>
        <div class="inv-slot" id="slot-4">💾</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

/**
 * ============================================================================
 * ENGINE CONFIGURATION & CONSTANTS
 * ============================================================================
 */
const CONFIG = {
    PLAYER: {
        HEIGHT: 1.8,
        WALK_SPEED: 0.15,
        SPRINT_SPEED: 0.32,
        JUMP_FORCE: 0.15,
        EYE_LEVEL: 1.7,
        INTERACT_DIST: 5
    },
    WORLD: {
        SIZE: 1500,
        BUILDING_COUNT: 120,
        GRID_COLOR: 0x00ffff,
        FOG_DENSITY: 0.025
    },
    AI: {
        ENEMY_COUNT: 30,
        DETECTION_RANGE: 40,
        ATTACK_RANGE: 2.5,
        MOVE_SPEED: 0.08
    }
};

/**
 * ============================================================================
 * CORE ENGINE CLASS
 * ============================================================================
 */
class CyberEngine {
    constructor() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 2500);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        this.clock = new THREE.Clock();
        this.controls = null;
        
        this.entities = {
            enemies: [],
            vfx: [],
            buildings: []
        };
        
        this.player = {
            hp: 100,
            isDead: false,
            velocity: new THREE.Vector3(),
            onGround: true,
            currentSlot: 0
        };

        this.input = { keys: {}, mouse: new THREE.Vector2() };
        this.handRoot = new THREE.Group();
        this.weapons = [];
    }

    async boot() {
        await this.showLoadingSequence();
        this.initGraphics();
        this.initPhysics();
        this.initWorld();
        this.initPlayer();
        this.initAI();
        this.bindEvents();
        
        document.getElementById('ui-layer').style.display = 'block';
        this.loop();
    }

    async showLoadingSequence() {
        const loader = document.getElementById('boot-loader');
        const logs = [
            "INITIALIZING NEURAL LINK...",
            "LOADING ASSETS: STEVE_CORE_MODEL_v4",
            "GENERATING PROCEDURAL CITYSCAPE...",
            "ENCRYPTING VOXEL DATA...",
            "ESTABLISHING POINTER LOCK...",
            "READY FOR SYNC."
        ];

        for (const log of logs) {
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerText = `> ${log}`;
            loader.appendChild(line);
            await new Promise(r => setTimeout(r, 400));
        }

        return new Promise(r => {
            const btn = document.createElement('button');
            btn.innerText = "START_SESSION";
            btn.style = "margin-top: 20px; padding: 15px; border: 2px solid #0ff; background: none; color: #0ff; cursor: pointer; font-family: 'Orbitron';";
            btn.onclick = () => {
                loader.style.display = 'none';
                this.controls.lock();
                r();
            };
            loader.appendChild(btn);
        });
    }

    initGraphics() {
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(this.renderer.domElement);

        this.scene.background = new THREE.Color(0x000508);
        this.scene.fog = new THREE.FogExp2(0x000508, CONFIG.WORLD.FOG_DENSITY);

        const amb = new THREE.AmbientLight(0x4040ff, 0.2);
        this.scene.add(amb);

        this.spotlight = new THREE.PointLight(0x00ffff, 2.5, 30);
        this.camera.add(this.spotlight);
        this.scene.add(this.camera);
    }

    initPhysics() {
        // Simple Raycast floor check
        this.raycaster = new THREE.Raycaster();
    }

    initWorld() {
        // Floor
        const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(3000, 3000),
            new THREE.MeshStandardMaterial({ color: 0x020202, metalness: 0.9, roughness: 0.1 })
        );
        plane.rotation.x = -Math.PI / 2;
        this.scene.add(plane);

        const grid = new THREE.GridHelper(3000, 150, 0x00ffff, 0x001122);
        this.scene.add(grid);

        // Buildings
        for(let i=0; i < CONFIG.WORLD.BUILDING_COUNT; i++) {
            const h = 20 + Math.random() * 150;
            const w = 15 + Math.random() * 20;
            const geo = new THREE.BoxGeometry(w, h, w);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x000000, 
                emissive: 0x00ffff, 
                emissiveIntensity: Math.random() * 0.2 
            });
            const b = new THREE.Mesh(geo, mat);
            b.position.set(
                (Math.random()-0.5) * 1000,
                h/2,
                (Math.random()-0.5) * 1000
            );
            this.scene.add(b);
            this.entities.buildings.push(b);
        }
    }

    initPlayer() {
        this.controls = new PointerLockControls(this.camera, document.body);
        this.camera.position.set(0, CONFIG.PLAYER.HEIGHT, 0);

        // Hand Model
        this.handRoot.position.set(0.5, -0.4, -0.6);
        this.camera.add(this.handRoot);

        // Weapon - Sword
        const sword = new THREE.Group();
        const blade = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 1.4, 0.05),
            new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 })
        );
        blade.position.y = 0.7;
        const guard = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.15), new THREE.MeshStandardMaterial({color: 0x222222}));
        sword.add(blade, guard);
        sword.rotation.x = Math.PI / 3;
        
        this.weapons.push(sword);
        this.handRoot.add(sword);
    }

    initAI() {
        for(let i=0; i<CONFIG.AI.ENEMY_COUNT; i++) {
            this.spawnEnemy();
        }
    }

    spawnEnemy() {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 0.2 });
        
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.4), mat);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.0;
        
        group.add(body, head);
        
        const angle = Math.random() * Math.PI * 2;
        const radius = 100 + Math.random() * 200;
        group.position.set(Math.cos(angle)*radius, 0.7, Math.sin(angle)*radius);
        
        this.scene.add(group);
        this.entities.enemies.push({
            mesh: group,
            hp: 10,
            lastAttack: 0,
            velocity: new THREE.Vector3()
        });
    }

    bindEvents() {
        window.addEventListener('keydown', (e) => this.input.keys[e.code] = true);
        window.addEventListener('keyup', (e) => this.input.keys[e.code] = false);
        window.addEventListener('mousedown', () => this.onAction());
        window.addEventListener('resize', () => {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    onAction() {
        if(!this.controls.isLocked || this.player.isDead) return;

        // Attack Animation
        this.handRoot.rotation.x -= 1.5;
        setTimeout(() => this.handRoot.rotation.x += 1.5, 150);

        // Raycasting for damage
        this.raycaster.setFromCamera({x:0, y:0}, this.camera);
        const hits = this.raycaster.intersectObjects(this.scene.children, true);

        for(let hit of hits) {
            let root = hit.object;
            while(root.parent && root.parent !== this.scene) root = root.parent;
            
            const enemy = this.entities.enemies.find(e => e.mesh === root);
            if(enemy && hit.distance < CONFIG.PLAYER.INTERACT_DIST) {
                this.damageEnemy(enemy, hit.point);
                break;
            }
        }
    }

    damageEnemy(enemy, point) {
        enemy.hp -= 2;
        this.createVFX(point, 0x00ffff);
        
        // Push back
        const dir = enemy.mesh.position.clone().sub(this.camera.position).normalize();
        enemy.mesh.position.add(dir.multiplyScalar(2));

        if(enemy.hp <= 0) {
            this.scene.remove(enemy.mesh);
            this.entities.enemies = this.entities.enemies.filter(e => e !== enemy);
            setTimeout(() => this.spawnEnemy(), 5000);
        }
    }

    createVFX(pos, color) {
        for(let i=0; i<15; i++) {
            const p = new THREE.Mesh(
                new THREE.BoxGeometry(0.15, 0.15, 0.15),
                new THREE.MeshBasicMaterial({ color: color })
            );
            p.position.copy(pos);
            const vel = new THREE.Vector3(
                (Math.random()-0.5)*0.4,
                Math.random()*0.4,
                (Math.random()-0.5)*0.4
            );
            this.scene.add(p);
            this.entities.vfx.push({ mesh: p, vel, life: 1.0 });
        }
    }

    updatePlayer(delta) {
        if(!this.controls.isLocked) return;

        const speed = this.input.keys['ShiftLeft'] ? CONFIG.PLAYER.SPRINT_SPEED : CONFIG.PLAYER.WALK_SPEED;
        const move = new THREE.Vector3();

        if(this.input.keys['KeyW']) move.z -= 1;
        if(this.input.keys['KeyS']) move.z += 1;
        if(this.input.keys['KeyA']) move.x -= 1;
        if(this.input.keys['KeyD']) move.x += 1;

        move.normalize().multiplyScalar(speed);
        this.controls.moveRight(move.x);
        this.controls.moveForward(-move.z);

        // Height Fix (Ground Lock)
        this.camera.position.y = CONFIG.PLAYER.HEIGHT;

        // Weapon Bobbing & Sway
        const time = Date.now() * 0.005;
        if(move.length() > 0) {
            this.handRoot.position.y = -0.4 + Math.sin(time * 2) * 0.05;
            this.handRoot.position.x = 0.5 + Math.cos(time) * 0.02;
            this.camera.rotation.z = Math.sin(time) * 0.01;
        } else {
            this.handRoot.position.y = THREE.MathUtils.lerp(this.handRoot.position.y, -0.4, 0.1);
            this.camera.rotation.z = THREE.MathUtils.lerp(this.camera.rotation.z, 0, 0.1);
        }
    }

    updateAI(delta) {
        this.entities.enemies.forEach(enemy => {
            const dist = enemy.mesh.position.distanceTo(this.camera.position);

            if(dist < CONFIG.AI.DETECTION_RANGE) {
                enemy.mesh.lookAt(this.camera.position.x, 0.7, this.camera.position.z);
                
                if(dist > CONFIG.AI.ATTACK_RANGE) {
                    const dir = this.camera.position.clone().sub(enemy.mesh.position).normalize();
                    enemy.mesh.position.add(dir.multiplyScalar(CONFIG.AI.MOVE_SPEED));
                } else {
                    // Attack player
                    if(Date.now() - enemy.lastAttack > 2000) {
                        this.damagePlayer(10);
                        enemy.lastAttack = Date.now();
                    }
                }
            }
        });
    }

    damagePlayer(amount) {
        this.player.hp -= amount;
        const overlay = document.getElementById('damage-overlay');
        overlay.style.boxShadow = "inset 0 0 100px rgba(255,0,0,1)";
        setTimeout(() => overlay.style.boxShadow = "inset 0 0 0 rgba(255,0,0,0)", 150);
        
        document.getElementById('hp-val').innerText = this.player.hp;
        document.getElementById('hp-fill').style.width = this.player.hp + "%";

        if(this.player.hp <= 0 && !this.player.isDead) {
            this.player.isDead = true;
            alert("SYSTEM_CRITICAL_ERROR: STEVE_DELETED");
            location.reload();
        }
    }

    updateVFX() {
        for(let i = this.entities.vfx.length - 1; i >= 0; i--) {
            const v = this.entities.vfx[i];
            v.mesh.position.add(v.vel);
            v.vel.y -= 0.015; // Gravity
            v.life -= 0.02;
            v.mesh.scale.setScalar(v.life);

            if(v.life <= 0) {
                this.scene.remove(v.mesh);
                this.entities.vfx.splice(i, 1);
            }
        }
    }

    loop() {
        requestAnimationFrame(() => this.loop());
        const delta = this.clock.getDelta();

        this.updatePlayer(delta);
        this.updateAI(delta);
        this.updateVFX();

        this.renderer.render(this.scene, this.camera);
    }
}

// Start Engine
const Engine = new CyberEngine();
Engine.boot();

</script>
</body>
</html>
